<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Ulpenat Tzvia Kokhav Ya'akov</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Secular+One&family=Inter:wght@300;400;500;600;700&family=Bebas+Neue&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root{
    --bg:        #fafaf6;
    --bg-2:      #ffffff;
    --bg-3:      #f1efe7;
    --ink:       #000b21;
    --ink-soft:  #2a3754;
    --ink-mute:  #6c7388;
    --line:      rgba(0,11,33,0.10);
    --line-2:    rgba(0,11,33,0.20);
    --line-3:    rgba(0,11,33,0.35);
    --gold:      #eca948;
    --gold-deep: #c98f2c;
    --shadow-sm: 0 1px 0 rgba(0,11,33,0.04), 0 6px 16px -8px rgba(0,11,33,0.10);
    --shadow-md: 0 1px 0 rgba(0,11,33,0.05), 0 14px 32px -16px rgba(0,11,33,0.14);
    --shadow-lg: 0 2px 0 rgba(0,11,33,0.04), 0 28px 60px -28px rgba(0,11,33,0.22);
  }
  .zone-dark{
    --bg:        #000b21;
    --bg-2:      #061634;
    --bg-3:      #0c1f44;
    --ink:       #ffffff;
    --ink-soft:  rgba(255,255,255,0.82);
    --ink-mute:  rgba(255,255,255,0.5);
    --line:      rgba(255,255,255,0.10);
    --line-2:    rgba(255,255,255,0.22);
    --line-3:    rgba(255,255,255,0.35);
  }
  *{box-sizing:border-box}
  html,body{ margin:0; padding:0; background: var(--bg); color: var(--ink); scroll-behavior: smooth;}
  body{
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 15px; font-weight: 400;
    -webkit-font-smoothing: antialiased;
    line-height: 1.55;
  }
  .page{ padding: 0 56px;}
  @media (max-width: 900px){ .page{ padding: 0 24px;}}
  section{ padding-top: 120px;}

  /* ── SECTION HEADER (no meta now) ─────────────────────── */
  .sect-hd{
    display:flex; flex-direction: column;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--line-2);
    margin-bottom: 56px;
  }
  .sect-hd .num{
    font-family:'Bebas Neue', sans-serif; font-size: 13px;
    letter-spacing: .32em;
    color: var(--gold);
    margin-bottom: 18px;
  }
  .sect-hd .num::before{ content:'//  '; opacity: .6;}
  .sect-hd h2{
    font-family:'Secular One', sans-serif; font-weight: 400;
    font-size: clamp(48px, 6vw, 88px);
    line-height: 0.95; letter-spacing: -0.015em;
    color: var(--ink);
    margin: 0;
    text-transform: uppercase;
  }
  .sect-hd h2 .gold{ color: var(--gold);}
  .sect-hd h2 .stop{ color: var(--gold);}

  /* ── ANNOUNCEMENT STRIP (over hero) ───────────────────── */
  .announce{
    position: absolute; top: 0; left: 0; right: 0;
    z-index: 12;
    padding: 8px 56px;
    background: transparent;
    border-bottom: 1px solid rgba(255,255,255,0.10);
    display: flex; justify-content: center; align-items: center; gap: 16px;
    font-family:'Instrument Sans', sans-serif;
    font-size: 11px; font-weight: 500;
    color: rgba(255,255,255,0.7);
    letter-spacing: .16em; text-transform: uppercase;
  }
  .announce::before{
    content:''; width: 5px; height: 5px; border-radius: 50%;
    background: var(--gold); display: inline-block;
    box-shadow: 0 0 8px rgba(236,169,72,0.6);
  }
  .announce a{ color: var(--gold); text-decoration: none; display: inline-flex; align-items: center; gap: 6px;}
  .announce a .arr{ transition: transform .14s;}
  .announce a:hover .arr{ transform: translateX(4px);}

  /* ── TOP NAV — sticky + morph from floating pill to full-width bar ── */
  .topnav-wrap{
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 56px 80px 0;
    pointer-events: none;
    transition: padding 0.55s cubic-bezier(0.25, 0.1, 0.25, 1);
  }
  .topnav-wrap.scrolled{ padding: 0;}
  .topnav{
    pointer-events: auto;
    position: relative;
    margin: 0 auto;
    max-width: 1240px;
    padding: 14px 28px;
    border-radius: 999px;
    background: rgba(10, 18, 38, 0.55);
    -webkit-backdrop-filter: blur(16px) saturate(160%);
    backdrop-filter: blur(16px) saturate(160%);
    border: 1px solid rgba(255,255,255,0.10);
    box-shadow: 0 6px 24px rgba(0,0,0,0.18);
    display: flex; justify-content: space-between; align-items: center;
    gap: 32px;
    transition: max-width 0.55s cubic-bezier(0.25,0.1,0.25,1),
                border-radius 0.55s cubic-bezier(0.25,0.1,0.25,1),
                padding 0.55s cubic-bezier(0.25,0.1,0.25,1),
                background 0.55s ease,
                border-color 0.55s ease,
                box-shadow 0.55s ease;
  }
  .topnav-wrap.scrolled .topnav{
    max-width: 100%;
    border-radius: 0;
    padding: 16px 56px;
    background: rgba(0, 11, 33, 0.94);
    border-color: rgba(255,255,255,0.04);
    border-width: 0 0 1px 0;
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.22);
  }
  .topnav .brand{
    display: flex; align-items: center; gap: 14px;
    cursor: pointer;
  }
  .topnav .brand .logo-circle{
    width: 56px; height: 56px;
    background: #ffffff;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    padding: 6px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.25);
  }
  .topnav .brand .logo-circle img{
    width: 100%; height: 100%; object-fit: contain;
  }
  .topnav .brand .brand-text{
    color: #fff;
    line-height: 1.2;
  }
  .topnav .brand .brand-text .name{
    font-family:'Secular One', sans-serif;
    font-size: 16px;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }
  .topnav .brand .brand-text .sub{
    font-family:'Bebas Neue', sans-serif;
    font-size: 11px;
    color: rgba(255,255,255,0.6);
    letter-spacing: .28em;
    margin-top: 2px;
  }
  .topnav .right{
    display: flex; align-items: center; gap: 36px;
  }
  .topnav nav{
    display: flex; gap: 36px;
  }
  .topnav nav a{
    font-family:'Instrument Sans', sans-serif;
    font-size: 12px; font-weight: 500;
    letter-spacing: .26em; text-transform: uppercase;
    color: rgba(255,255,255,0.78);
    text-decoration: none;
    padding: 6px 0;
    position: relative;
    transition: color .14s;
  }
  .topnav nav a::before{
    content:'·'; position:absolute;
    left: 50%; bottom: -10px; transform: translateX(-50%);
    color: var(--gold); opacity: 0;
    transition: opacity .18s;
    font-size: 16px; line-height: 0;
  }
  .topnav nav a:hover{ color: #fff;}
  .topnav nav a:hover::before, .topnav nav a.active::before{ opacity: 1;}
  .topnav nav a.active{ color: #fff;}
  .lang-toggle{
    font-family:'Instrument Sans', sans-serif;
    font-size: 12px; font-weight: 500;
    color: rgba(255,255,255,0.7);
    letter-spacing: .2em; text-transform: uppercase;
    cursor: pointer; transition: color .14s;
    padding-left: 12px;
    border-left: 1px solid rgba(255,255,255,0.18);
  }
  .lang-toggle:hover{ color: var(--gold);}

  /* ── HERO ─────────────────────────────────────────────── */
  .hero{
    position: relative;
    width: 100%;
    height: 100vh;
    min-height: 720px;
    overflow: hidden;
    background: var(--bg);
  }
  .hero .video-bg{
    position: absolute; inset: 0;
    background-image: url('https://images.unsplash.com/photo-1481627834876-b7833e8f5570?w=2400&q=85&auto=format&fit=crop');
    background-size: cover; background-position: center;
    transform: scale(1.04);
    animation: kenburns 28s ease-in-out infinite alternate;
  }
  @keyframes kenburns{
    0%{ transform: scale(1.04) translateX(0);}
    100%{ transform: scale(1.12) translateX(-2%);}
  }
  .hero .video-bg::after{
    content:''; position: absolute; inset: 0;
    background:
      linear-gradient(180deg, rgba(0,11,33,0.55) 0%, rgba(0,11,33,0.30) 25%, rgba(0,11,33,0.35) 55%, rgba(0,11,33,0.92) 100%),
      linear-gradient(90deg, rgba(0,11,33,0.55) 0%, transparent 55%);
  }
  .hero .micro-grid{
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px);
    background-size: 96px 96px;
    mask-image: radial-gradient(circle at 50% 50%, black 30%, transparent 90%);
    pointer-events: none;
  }

  .hero-content{
    position: absolute; left: 56px; right: 56px; bottom: 56px;
    z-index: 5;
  }
  .hero-content .copy{ max-width: 720px;}
  .hero-content .kicker{
    font-family:'Bebas Neue', sans-serif;
    font-size: 11px;
    letter-spacing: .34em;
    color: rgba(255,255,255,0.78);
    margin-bottom: 18px;
    display: inline-flex; align-items: center; gap: 12px;
  }
  .hero-content .kicker::before{
    content:''; display: inline-block; width: 28px; height: 1px;
    background: var(--gold);
  }
  .hero-content .kicker .b{ color: var(--gold);}
  .hero-content h1{
    font-family:'Secular One', sans-serif; font-weight: 400;
    font-size: clamp(36px, 4.2vw, 64px);
    line-height: 0.95; letter-spacing: -0.018em;
    text-transform: uppercase;
    margin: 0 0 28px;
    color: #ffffff;
    max-width: 720px;
  }
  .hero-content h1 span{ display: block;}
  .hero-content h1 .gold{ color: var(--gold); position: relative;}
  .hero-content h1 .gold::after{
    content:''; position: absolute; left: 0; right: 0; bottom: -4px;
    height: 3px; background: var(--gold); opacity: 0.22;
  }

  .hero-cta{ display: flex; gap: 22px; align-items: center;}
  .btn-pill{
    background: var(--gold);
    color: #000b21;
    border: none;
    padding: 12px 24px;
    border-radius: 999px;
    font-family:'Instrument Sans', sans-serif;
    font-weight: 700; font-size: 11px;
    letter-spacing: .22em; text-transform: uppercase;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 10px;
    transition: background .14s, transform .14s, box-shadow .14s;
  }
  .btn-pill:hover{
    background: #f5b860; transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(236,169,72,0.35);
  }
  .btn-pill .arr{ font-family:'Inter'; font-weight: 400; font-size: 14px;}
  .hero-cta .ghost{
    background: transparent; border: none;
    color: rgba(255,255,255,0.85);
    font-family:'Instrument Sans', sans-serif;
    font-size: 11px; font-weight: 500;
    letter-spacing: .22em; text-transform: uppercase;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 12px;
    padding: 6px 4px;
    transition: color .14s;
  }
  .hero-cta .ghost:hover{ color: var(--gold);}
  .hero-cta .ghost:hover .play-circle{ border-color: var(--gold); background: rgba(236,169,72,0.1);}
  .hero-cta .play-circle{
    width: 36px; height: 36px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.4);
    display: inline-flex; align-items: center; justify-content: center;
    color: #fff; font-size: 10px;
    transition: border-color .14s, background .14s;
  }

  /* ── ABOUT ────────────────────────────────────────────── */
  .about{
    display: grid; grid-template-columns: 1fr 1.05fr; gap: 80px;
    align-items: start;
  }
  .about-copy h3{
    font-family:'Secular One', sans-serif; font-weight: 400;
    font-size: clamp(36px, 3.4vw, 52px);
    line-height: 1.0; letter-spacing: -0.018em;
    text-transform: uppercase;
    color: var(--ink); margin: 0 0 30px;
    max-width: 580px;
  }
  .about-copy h3 .gold{ color: var(--gold);}
  .about-copy .lede{
    font-size: 18px; line-height: 1.55;
    color: var(--ink); font-weight: 400;
    max-width: 560px; margin: 0 0 24px;
  }
  .about-copy .body{
    color: var(--ink-soft); font-size: 14.5px; line-height: 1.7;
    max-width: 540px;
  }
  .about-copy .body p{ margin: 0 0 14px;}
  .about-copy .body .pull{
    margin: 28px 0;
    padding: 18px 0 18px 24px;
    border-left: 2px solid var(--gold);
    color: var(--ink);
    font-family:'Secular One', sans-serif;
    font-size: 22px; line-height: 1.3; font-weight: 400;
    letter-spacing: -0.008em;
    max-width: 480px;
  }
  .about-copy .body .pull .who{
    display: block;
    font-family:'Bebas Neue', sans-serif;
    font-size: 12px; color: var(--ink-mute);
    letter-spacing: .26em; text-transform: uppercase;
    margin-top: 12px;
  }
  .stats-row{
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 0;
    margin-top: 44px;
    border-top: 1px solid var(--line-2);
    border-bottom: 1px solid var(--line-2);
  }
  .stat-il{
    padding: 24px 24px 22px 0;
    border-right: 1px solid var(--line);
  }
  .stat-il:last-child{ border-right: none;}
  .stat-il .n{
    font-family:'Secular One', sans-serif; font-weight: 400;
    font-size: 52px; line-height: 1;
    color: var(--ink); letter-spacing: -0.02em;
  }
  .stat-il .n .u{ font-size: 18px; color: var(--gold); margin-left: 4px;}
  .stat-il .l{
    font-family:'Bebas Neue', sans-serif; font-size: 12px;
    color: var(--ink-mute); letter-spacing: .26em; text-transform: uppercase;
    margin-top: 12px;
  }
  .about-imgs{
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 320px 240px;
    gap: 14px;
  }
  .about-imgs .img-wrap{
    position: relative; overflow: hidden;
    background: var(--bg-3);
    box-shadow: var(--shadow-md);
  }
  .about-imgs .img-wrap.big{ grid-column: 1 / 3;}
  .about-imgs .img-wrap img{
    width: 100%; height: 100%; object-fit: cover;
    filter: brightness(0.94) saturate(0.96);
    transition: transform .8s ease;
  }
  .about-imgs .img-wrap:hover img{ transform: scale(1.04);}
  .about-imgs .img-wrap .caption{
    position: absolute; bottom: 12px; left: 14px;
    font-family:'Bebas Neue', sans-serif; font-size: 11px;
    color: #fff; letter-spacing: .24em; text-transform: uppercase;
    background: rgba(0,11,33,0.7);
    padding: 4px 10px;
    backdrop-filter: blur(4px);
  }

  /* ── NEWS ───────────────────────────────────────────── */
  .news-grid{
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px;
  }
  .news-card{
    background: var(--bg-2);
    border: 1px solid var(--line);
    box-shadow: var(--shadow-sm);
    display: flex; flex-direction: column;
    cursor: pointer;
    transition: transform .2s ease, border-color .18s, box-shadow .2s;
    overflow: hidden;
  }
  .news-card:hover{
    transform: translateY(-4px);
    border-color: var(--gold);
    box-shadow: var(--shadow-md);
  }
  .news-card .thumb{
    height: 280px;
    overflow: hidden;
    position: relative;
  }
  .news-card .thumb img{
    width: 100%; height: 100%; object-fit: cover;
    transition: transform .6s ease;
  }
  .news-card:hover .thumb img{ transform: scale(1.05);}
  .news-card .thumb .tag-overlay{
    position: absolute; top: 16px; left: 16px;
    background: rgba(255,255,255,0.96);
    color: var(--ink);
    padding: 5px 12px;
    font-family:'Bebas Neue', sans-serif;
    font-size: 11px; letter-spacing: .26em; text-transform: uppercase;
  }
  .news-card .body{
    padding: 24px 24px 28px;
    display: flex; flex-direction: column; gap: 14px;
    flex: 1;
  }
  .news-card .meta{
    font-family:'Bebas Neue', sans-serif;
    font-size: 12px; color: var(--ink-mute);
    letter-spacing: .24em; text-transform: uppercase;
  }
  .news-card h4{
    font-family:'Secular One', sans-serif; font-weight: 400;
    font-size: 19px; line-height: 1.18;
    text-transform: uppercase;
    letter-spacing: -0.008em;
    color: var(--ink);
    margin: 0;
    overflow-wrap: anywhere;
    hyphens: auto;
  }
  .news-card .ex{
    font-size: 13.5px; color: var(--ink-soft);
    line-height: 1.55; margin: 0;
    flex: 1;
  }
  .news-card .read{
    font-family:'Bebas Neue', sans-serif;
    font-size: 12px; color: var(--gold-deep);
    letter-spacing: .26em; text-transform: uppercase;
    text-decoration: none;
    display: inline-flex; align-items: center; gap: 10px;
    margin-top: 4px;
  }
  .news-card .read .arr{ transition: transform .14s; font-family:'Inter';}
  .news-card:hover .read .arr{ transform: translateX(5px);}
  .news-foot{
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 40px;
    font-family:'Instrument Sans', sans-serif;
    font-size: 12px; font-weight: 500;
    color: var(--ink-mute);
    letter-spacing: .16em; text-transform: uppercase;
  }
  .news-foot .more-link{
    color: var(--ink); text-decoration: none;
    display: inline-flex; align-items: center; gap: 12px;
    font-family:'Bebas Neue', sans-serif;
    font-size: 14px; letter-spacing: .28em;
    padding: 12px 22px;
    border: 1px solid var(--ink);
    border-radius: 99px;
    transition: background .14s, color .14s;
  }
  .news-foot .more-link:hover{ background: var(--ink); color: var(--bg);}

  /* ── ACTIVITIES (extracurriculars — bento grid) ─────── */
  .acts-intro{
    display: grid; grid-template-columns: 1fr 1fr; gap: 80px;
    align-items: end;
    margin-bottom: 40px;
  }
  .acts-intro h3{
    font-family:'Secular One', sans-serif; font-weight: 400;
    font-size: clamp(32px, 3vw, 44px);
    line-height: 1.02; letter-spacing: -0.012em;
    text-transform: uppercase;
    color: var(--ink); margin: 0 0 16px;
    max-width: 560px;
  }
  .acts-intro h3 .gold{ color: var(--gold);}
  .acts-intro p{
    font-size: 15.5px; color: var(--ink-soft);
    line-height: 1.6; margin: 0; max-width: 460px;
  }
  .acts-filters{
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 28px;
  }
  .acts-filters .chip{
    border: 1px solid var(--line-2);
    background: transparent;
    color: var(--ink-soft);
    padding: 9px 18px;
    border-radius: 999px;
    font-family:'Bebas Neue', sans-serif;
    font-size: 12px; letter-spacing: .24em; text-transform: uppercase;
    cursor: pointer;
    transition: background .14s, color .14s, border-color .14s;
  }
  .acts-filters .chip:hover{ border-color: var(--ink);}
  .acts-filters .chip.on{
    background: var(--ink); color: #fff; border-color: var(--ink);
  }
  .acts-filters .count{
    margin-left: auto;
    font-family:'Bebas Neue', sans-serif;
    font-size: 12px; color: var(--ink-mute);
    letter-spacing: .24em; text-transform: uppercase;
    align-self: center;
  }

  .bento{
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-auto-rows: 260px;
    gap: 14px;
  }
  .tile{
    position: relative;
    overflow: hidden;
    background: var(--bg-3);
    cursor: pointer;
    box-shadow: var(--shadow-sm);
    transition: box-shadow .25s, transform .25s;
  }
  .tile:hover{ box-shadow: var(--shadow-lg); transform: translateY(-2px);}
  .tile img{
    width: 100%; height: 100%; object-fit: cover;
    filter: brightness(0.7);
    transition: filter .35s, transform .8s ease;
  }
  .tile:hover img{ filter: brightness(0.55); transform: scale(1.06);}
  .tile::after{
    content:''; position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(0,11,33,0.0) 30%, rgba(0,11,33,0.55) 65%, rgba(0,11,33,0.92) 100%);
    pointer-events: none;
  }
  .tile .body{
    position: absolute; left: 0; right: 0; bottom: 0;
    z-index: 2;
    padding: 22px 24px 24px;
    color: #fff;
  }
  .tile .body .cat{
    font-family:'Bebas Neue', sans-serif;
    font-size: 11px; color: var(--gold);
    letter-spacing: .28em; text-transform: uppercase;
    margin-bottom: 8px;
    display: inline-block;
  }
  .tile .body h5{
    font-family:'Secular One', sans-serif; font-weight: 400;
    font-size: 22px; line-height: 1.05;
    margin: 0 0 6px;
    text-transform: uppercase;
