<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Ulpenat Tzvia — Wireframe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Kalam:wght@300;400;700&family=Architects+Daughter&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root{
    --paper: #f8f5ee;
    --paper-2: #efeadc;
    --ink: #111;
    --ink-soft: #444;
    --rule: #1a1a1a;
    --rule-soft: rgba(17,17,17,0.35);
    --accent: #1a3a8a;      /* tzvia blue, muted */
    --accent-warm: #d49a3b; /* wheat gold */
    --highlight: #fff2a8;
    --crit: #c8412a;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);}
  body{
    font-family: 'Kalam', 'Caveat', cursive;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(0,0,0,0.025), transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(0,0,0,0.02), transparent 50%);
    background-attachment: fixed;
  }
  .mono{ font-family:'JetBrains Mono', monospace; }
  .hand{ font-family:'Caveat', cursive; }
  .arch{ font-family:'Architects Daughter', cursive; }

  /* page width */
  .page { max-width: 1400px; margin: 0 auto; padding: 24px 28px 80px; }

  /* annotation tags */
  .tag {
    display:inline-flex; align-items:center; gap:6px;
    font-family:'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: .08em; text-transform: uppercase;
    background: var(--ink); color: var(--paper);
    padding: 3px 8px; border-radius: 2px;
  }
  .tag.alt { background: transparent; color: var(--ink); border: 1px dashed var(--ink); }
  .tag.warn { background: var(--crit); color:#fff; }
  .tag.note { background: var(--highlight); color: var(--ink); border: 1px solid rgba(0,0,0,0.4); }

  /* sketch primitives */
  .sk-box {
    border: 2px solid var(--rule);
    border-radius: 6px;
    background: rgba(255,255,255,0.4);
    position: relative;
  }
  .sk-box.dashed { border-style: dashed; }
  .sk-box.tilt-1 { transform: rotate(-0.25deg); }
  .sk-box.tilt-2 { transform: rotate(0.3deg); }
  .sk-stripes {
    background-image: repeating-linear-gradient(
      45deg,
      rgba(17,17,17,0.06) 0 8px,
      transparent 8px 18px
    );
  }
  .sk-x { /* placeholder X */
    position: relative;
    overflow: hidden;
  }
  .sk-x::before, .sk-x::after{
    content:''; position:absolute; inset:0;
    border-left: 1.5px solid rgba(17,17,17,0.35);
    border-right: 1.5px solid rgba(17,17,17,0.35);
  }
  .sk-x::before { transform: rotate(0); border:none;
    background:
      linear-gradient(to top right, transparent calc(50% - 1px), rgba(17,17,17,0.4) 50%, transparent calc(50% + 1px)),
      linear-gradient(to bottom right, transparent calc(50% - 1px), rgba(17,17,17,0.4) 50%, transparent calc(50% + 1px));
  }
  .sk-x::after { display:none; }
  .sk-label {
    position:absolute; top:-12px; left:14px;
    background: var(--paper); padding: 0 8px;
    font-family:'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--ink);
  }
  .sk-corner-id {
    position: absolute; top: 8px; right: 10px;
    font-family:'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: .08em;
    color: rgba(17,17,17,0.5);
  }

  /* section spacing */
  section { margin-top: 36px; }
  .section-head{
    display:flex; align-items:baseline; gap: 14px;
    border-bottom: 1.5px dashed var(--rule-soft);
    padding-bottom: 6px;
    margin-bottom: 14px;
  }
  .section-head .num{
    font-family:'JetBrains Mono', monospace; font-size:13px;
    background: var(--ink); color: var(--paper);
    padding: 4px 8px; border-radius: 3px;
  }
  .section-head h2{
    font-family:'Caveat', cursive;
    font-weight: 700; font-size: 32px; margin:0; color: var(--ink);
  }
  .section-head .meta{
    margin-left:auto;
    font-family:'JetBrains Mono', monospace;
    font-size: 11px; color: rgba(17,17,17,0.55);
  }

  /* squiggle underline */
  .squig{
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='8'><path d='M0 5 Q 10 0 20 5 T 40 5 T 60 5 T 80 5 T 100 5 T 120 5' fill='none' stroke='%231a3a8a' stroke-width='2'/></svg>");
    background-repeat: repeat-x;
    background-position: 0 100%;
    padding-bottom: 6px;
  }

  /* HEADER NAV */
  .topnav{
    display:flex; align-items:center; justify-content:space-between;
    padding: 6px 4px 12px;
    border-bottom: 2px solid var(--ink);
    margin-bottom: 18px;
  }
  .topnav .brand{
    display:flex; align-items:center; gap:10px;
    font-family:'Caveat', cursive; font-size: 22px; font-weight:700;
  }
  .brand .logo-stub{
    width: 38px; height: 38px; border:2px solid var(--ink); border-radius: 50%;
    display:flex; align-items:center; justify-content:center;
    font-family:'JetBrains Mono', monospace; font-size:10px;
    background: rgba(26,58,138,0.08);
  }
  .topnav nav{
    display:flex; gap: 22px;
    font-family:'Kalam', cursive; font-size: 18px;
  }
  .topnav nav a{ color: var(--ink); text-decoration: none; border-bottom: 1.5px solid transparent; padding-bottom: 2px;}
  .topnav nav a.active{ border-bottom: 1.5px solid var(--ink); }
  .topnav .lang{
    font-family:'JetBrains Mono', monospace; font-size:11px;
    border:1.5px solid var(--ink); padding: 4px 10px; border-radius: 99px;
  }

  /* ===== HERO ===== */
  .hero{
    height: 600px;
    position: relative;
    overflow: hidden;
    border: 2.5px solid var(--ink);
    border-radius: 8px;
    background:
      linear-gradient(135deg, #0c1d3a, #1a3a8a 60%, #224a9b);
  }
  .hero-video-overlay{
    position:absolute; inset:0;
    background:
      repeating-linear-gradient(45deg, rgba(255,255,255,0.04) 0 14px, transparent 14px 28px);
    opacity: .55;
  }
  .hero .play-symbol{
    position:absolute; top:50%; left:50%; transform: translate(-50%,-50%);
    width: 110px; height: 110px; border-radius: 50%;
    border: 3px dashed rgba(255,255,255,0.65);
    display:flex; align-items:center; justify-content:center;
    color: rgba(255,255,255,0.85);
    font-family:'JetBrains Mono', monospace; font-size: 12px; letter-spacing: .1em;
    text-align:center;
  }
  .hero .video-tag{
    position:absolute; top:18px; left:18px;
    background: rgba(0,0,0,0.55); color:#fff;
    font-family:'JetBrains Mono', monospace; font-size: 11px;
    padding: 4px 9px; border-radius: 3px; letter-spacing:.08em;
  }
  .hero .video-tag .dot{
    display:inline-block; width:8px; height:8px; border-radius:50%;
    background: #e44; margin-right:6px; vertical-align: middle;
  }
  .hero .corner-tag{
    position:absolute; top:18px; right:18px;
    color: rgba(255,255,255,0.7);
    font-family:'JetBrains Mono', monospace; font-size:10px;
    letter-spacing: .12em;
  }
  .hero-content{
    position:absolute; left: 0; right:0; bottom: 0;
    padding: 36px 44px 38px;
    color: #fff;
  }
  .hero-content .kicker{
    font-family:'JetBrains Mono', monospace;
    font-size: 12px; letter-spacing: .25em; text-transform: uppercase;
    color: rgba(255,255,255,0.7);
    margin-bottom: 10px;
  }
  .hero-content h1{
    font-family:'Caveat', cursive;
    font-size: 76px; line-height: .95; margin: 0 0 6px;
    font-weight: 700;
    max-width: 900px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.4);
  }
  .hero-content h1 .blue-accent{ color: #ffd773; }
  .hero-content .sub{
    font-family:'Kalam', cursive; font-size: 20px;
    max-width: 580px;
    color: rgba(255,255,255,0.85);
    margin: 0 0 22px;
  }
  .cta-stack{
    display:flex; gap: 14px; align-items: stretch; flex-wrap: wrap;
  }
  .cta-primary{
    background: var(--accent-warm);
    color: #1a1a1a;
    border: 2.5px solid #1a1a1a;
    padding: 14px 22px;
    border-radius: 6px;
    font-family:'Kalam', cursive; font-weight: 700; font-size: 20px;
    display:flex; align-items:center; gap: 10px;
    box-shadow: 4px 4px 0 0 rgba(0,0,0,0.55);
    cursor:pointer;
  }
  .cta-primary .arrow{ font-family:'JetBrains Mono', monospace; }
  .cta-trailer{
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(2px);
    border: 2px dashed rgba(255,255,255,0.8);
    padding: 12px 20px;
    border-radius: 6px;
    color: #fff;
    display:flex; align-items:center; gap: 12px;
    cursor:pointer;
  }
  .cta-trailer .play-glyph{
    width: 32px; height: 32px; border-radius: 50%;
    background: #fff; color: #111;
    display:flex; align-items:center; justify-content:center;
    font-size: 14px;
  }
  .cta-trailer .small{
    font-family:'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: .15em; text-transform: uppercase;
    color: rgba(255,255,255,0.7);
  }
  .cta-trailer .label{
    font-family:'Kalam', cursive; font-size: 18px; line-height: 1.1;
  }

  /* annotation arrow lines */
  .annot{
    position:absolute;
    font-family:'Caveat', cursive;
    color: var(--ink);
    font-size: 18px;
    pointer-events: none;
  }
  .annot.light{ color: rgba(255,255,255,0.85); }
  .annot::before{
    content:'';
    position:absolute;
    border-left: 1.5px dashed currentColor;
    border-bottom: 1.5px dashed currentColor;
    border-bottom-left-radius: 12px;
    width: 30px; height: 30px;
  }

  /* ===== ABOUT ===== */
  .about{
    display: grid; grid-template-columns: 1.1fr 1fr; gap: 28px;
    align-items: start;
  }
  .about-copy h3{
    font-family:'Caveat', cursive; font-size: 42px; margin: 8px 0 6px;
  }
  .about-copy .lede{
    font-family:'Kalam', cursive; font-size: 19px; line-height: 1.55;
    color: var(--ink); margin: 0 0 14px;
  }
  .about-copy .body{
    font-family:'Kalam', cursive; font-size: 16px; line-height: 1.6;
    color: var(--ink-soft);
  }
  .about-copy .body p{ margin: 0 0 10px; }
  .about-stats{
    display:grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
    margin-top: 18px;
  }
  .stat{
    border: 2px solid var(--ink); border-radius: 6px;
    padding: 10px 12px; background: rgba(255,255,255,0.4);
  }
  .stat .n{ font-family:'Caveat', cursive; font-size: 36px; line-height: 1; }
  .stat .l{ font-family:'JetBrains Mono', monospace; font-size: 10px; letter-spacing:.12em; text-transform: uppercase; color: var(--ink-soft);}
  .about-visual{
    position:relative;
    height: 380px;
  }
  .about-visual .photo{
    position:absolute; inset: 0;
    border: 2px solid var(--ink); border-radius: 6px;
    overflow:hidden; background: var(--paper-2);
  }
  .about-visual .photo.a{ left: 0; top: 10px; width: 60%; height: 70%; transform: rotate(-1.2deg); }
  .about-visual .photo.b{ right: 0; top: 80px; width: 55%; height: 70%; transform: rotate(1.5deg); }
  .photo-stub{
    height:100%; width:100%;
    display:flex; align-items:center; justify-content:center;
    background-image:
      linear-gradient(135deg, rgba(0,0,0,0.05), rgba(0,0,0,0.05)),
      repeating-linear-gradient(45deg, rgba(0,0,0,0.05) 0 12px, transparent 12px 24px);
    color: rgba(0,0,0,0.55);
    font-family:'JetBrains Mono', monospace; font-size: 11px;
    letter-spacing: .12em; text-transform: uppercase;
    text-align:center; padding: 12px;
  }

  /* ===== NEWS CAROUSEL ===== */
  .news-rail{
    display:flex; gap: 18px; overflow-x: auto; padding: 4px 2px 18px;
    scroll-snap-type: x mandatory;
  }
  .news-rail::-webkit-scrollbar{ height: 8px; }
  .news-rail::-webkit-scrollbar-thumb{ background: rgba(0,0,0,0.3); border-radius: 4px; }
  .news-card{
    flex: 0 0 320px;
    border: 2px solid var(--ink); border-radius: 8px;
    background: rgba(255,255,255,0.55);
    overflow:hidden; scroll-snap-align: start;
    display:flex; flex-direction: column;
  }
  .news-card .thumb{
    height: 170px;
  }
  .news-card .meta{
    font-family:'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: .12em; text-transform: uppercase;
    color: var(--ink-soft);
    padding: 12px 14px 0;
    display:flex; gap:8px; align-items:center;
  }
  .news-card .meta .pill{
    background: var(--ink); color: var(--paper); padding: 2px 7px; border-radius: 99px;
  }
  .news-card h4{
    font-family:'Caveat', cursive; font-size: 26px;
    margin: 4px 14px 6px; line-height: 1.05; font-weight:700;
  }
  .news-card .ex{
    font-family:'Kalam', cursive; font-size: 14px;
    margin: 0 14px 12px; color: var(--ink-soft); flex:1;
  }
  .news-card .read{
    margin: 0 14px 14px;
    font-family:'Kalam', cursive; font-size: 16px;
    color: var(--accent); font-weight: 700;
    display:flex; align-items:center; gap: 6px;
  }
  .rail-controls{
    display:flex; justify-content: space-between; align-items: center;
    margin-top: 4px;
  }
  .rail-controls .dots{ display:flex; gap: 6px; }
  .rail-controls .dot{ width:10px; height:10px; border-radius:50%; border:1.5px solid var(--ink); }
  .rail-controls .dot.on{ background: var(--ink); }
  .arrow-btn{
    width: 38px; height: 38px; border:2px solid var(--ink); border-radius: 50%;
    background: var(--paper); font-family:'JetBrains Mono', monospace; font-weight: 700;
    cursor:pointer; box-shadow: 3px 3px 0 0 rgba(0,0,0,0.4);
  }

  /* ===== ACTIVITIES / ACADEMIC ===== */
  .academic-hero{
    position: relative;
    height: 480px;
    border: 2.5px solid var(--ink); border-radius: 8px;
    overflow:hidden;
    background:
      linear-gradient(160deg, #1a1a1a, #2b2b2b 60%, #3a3a3a);
  }
  .academic-hero .grid-overlay{
    position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .academic-hero .play-symbol{
    position:absolute; top: 38%; left:50%; transform: translate(-50%,-50%);
    width: 90px; height: 90px; border-radius: 50%;
    border: 3px dashed rgba(255,255,255,0.55);
    display:flex; align-items:center; justify-content:center;
    color: #fff;
  }
  .academic-hero .copy{
    position:absolute; left: 40px; right: 40px; bottom: 36px; color:#fff;
  }
  .academic-hero h3{
    font-family:'JetBrains Mono', monospace; font-size: 12px;
    letter-spacing: .25em; text-transform: uppercase;
    margin: 0 0 10px; color: var(--accent-warm);
  }
  .academic-hero h2{
    font-family:'Caveat', cursive; font-size: 54px; line-height: 1.02;
    margin: 0; max-width: 920px;
  }
  .academic-areas{
    display:grid; grid-template-columns: repeat(4, 1fr); gap: 14px;
    margin-top: 18px;
  }
  .area{
    border: 2px dashed var(--ink); border-radius: 6px;
    background: rgba(255,255,255,0.4);
    padding: 14px; min-height: 130px;
    display:flex; flex-direction:column; justify-content: space-between;
  }
  .area .icon{
    width: 36px; height: 36px; border-radius: 50%;
    border: 2px solid var(--ink);
    display:flex; align-items:center; justify-content:center;
    font-family:'JetBrains Mono', monospace; font-size: 11px;
    background: rgba(26,58,138,0.08);
  }
  .area h5{ font-family:'Caveat', cursive; font-size: 24px; margin: 8px 0 2px;}
  .area .desc{ font-family:'Kalam', cursive; font-size: 13px; color: var(--ink-soft); }

  /* ===== CALENDAR ===== */
  .cal-head{
    display:flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px;
  }
  .cal-head .month{
    font-family:'Caveat', cursive; font-size: 30px; font-weight:700;
  }
  .cal-head .controls{ display:flex; gap: 8px; align-items:center; font-family:'JetBrains Mono', monospace; font-size:12px;}
  .calendar{
    border: 2px solid var(--ink); border-radius: 8px;
    background: rgba(255,255,255,0.5);
    padding: 14px;
  }
  .cal-dow{
    display:grid; grid-template-columns: repeat(7, 1fr); gap: 8px;
    font-family:'JetBrains Mono', monospace; font-size: 11px;
    letter-spacing:.1em; text-transform: uppercase; color: var(--ink-soft);
    padding: 0 4px 8px;
    border-bottom: 1.5px dashed var(--rule-soft);
  }
  .cal-grid{
    display:grid; grid-template-columns: repeat(7, 1fr); gap: 8px;
    padding-top: 10px;
  }
  .day{
    position:relative;
    aspect-ratio: 1 / 0.85;
    border: 1.5px solid var(--rule-soft); border-radius: 4px;
    padding: 6px 8px;
    background: rgba(255,255,255,0.35);
    font-family:'Kalam', cursive; font-size: 14px;
  }
  .day.empty{ background: transparent; border-style: dashed; opacity:.4; }
  .day .n{
    font-family:'JetBrains Mono', monospace; font-size: 11px;
    color: var(--ink-soft);
  }
  .day.has-event{
    border: 2px solid var(--ink);
    background: rgba(255,255,255,0.7);
    cursor: pointer;
  }
  .day .ev-dot{
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    position: absolute; top: 8px; right: 8px;
  }
  .day .ev-dot.warm{ background: var(--accent-warm); }
  .day .ev-dot.crit{ background: var(--crit); }
  .day .ev-label{
    font-family:'Caveat', cursive; font-size: 18px;
    line-height: 1.05;
    margin-top: 4px;
  }
  /* hover card */
  .day.has-event:hover .hover-card{
    opacity:1; transform: translate(-50%, 0) rotate(-1deg); pointer-events: auto;
  }
  .hover-card{
    position:absolute; bottom: calc(100% + 12px); left: 50%;
    width: 280px; transform: translate(-50%, 8px) rotate(-1deg);
    opacity: 0; transition: opacity .15s ease, transform .15s ease;
    border: 2px solid var(--ink); border-radius: 6px;
    background: var(--paper);
    padding: 10px;
    box-shadow: 6px 6px 0 0 rgba(0,0,0,0.35);
    z-index: 30;
    pointer-events: none;
  }
  .hover-card .media{
    height: 100px; border:1.5px solid var(--ink); border-radius: 4px;
    margin-bottom: 8px;
    position:relative;
  }
  .hover-card .media .play{
    position:absolute; top:50%; left:50%; transform: translate(-50%,-50%);
    width: 32px; height: 32px; border-radius:50%; border: 2px solid var(--ink);
    background: var(--paper);
    display:flex; align-items:center; justify-content:center; font-size: 13px;
  }
  .hover-card h6{
    font-family:'Caveat', cursive; font-size: 22px;
    margin: 0 0 2px; font-weight: 700;
  }
  .hover-card .when{
    font-family:'JetBrains Mono', monospace; font-size: 10px;
    color: var(--ink-soft); letter-spacing:.1em; text-transform: uppercase;
    margin-bottom: 6px;
  }
  .hover-card .text{
    font-family:'Kalam', cursive; font-size: 13px; color: var(--ink-soft);
    line-height: 1.4;
  }
  .hover-card::after{
    content:''; position:absolute; bottom: -8px; left: 50%; transform: translateX(-50%) rotate(45deg);
    width: 12px; height: 12px;
    background: var(--paper);
    border-right: 2px solid var(--ink); border-bottom: 2px solid var(--ink);
  }
  .cal-legend{
    display:flex; gap: 18px; margin-top: 12px;
    font-family:'JetBrains Mono', monospace; font-size: 11px;
    color: var(--ink-soft); letter-spacing: .08em;
  }
  .cal-legend .swatch{ display:inline-block; width:10px; height:10px; border-radius:50%; margin-right:6px; vertical-align: middle; }

  /* ===== CONTACT FORM ===== */
  .contact{
    display:grid; grid-template-columns: 1fr 1.1fr; gap: 28px;
    align-items: start;
  }
  .contact-side h3{
    font-family:'Caveat', cursive; font-size: 42px; margin: 0 0 6px;
  }
  .contact-side p{ font-family:'Kalam', cursive; font-size:16px; color: var(--ink-soft);}
  .contact-info{ display:flex; flex-direction: column; gap: 8px; margin-top: 14px; }
  .info-row{
    display:flex; gap: 10px; align-items:flex-start;

function Calendar(){
  // build a 30-day grid starting on Sun (offset 0 to keep simple)
  const days = [];
  const startOffset = 5; // friday-ish start to break alignment
  for (let i = 0; i < startOffset; i++) days.push({ empty: true });
  for (let d = 1; d <= 30; d++) days.push({ d });
  while (days.length % 7 !== 0) days.push({ empty: true });

  return (
    <section>
      <div className="section-head">
        <span className="num">05</span>
        <h2 className="squig">Institutional Calendar</h2>
        <span className="meta">hover a date · card with media + details</span>
      </div>
      <div className="cal-head">
        <div className="month">June · 2026</div>
        <div className="controls">
          <button className="arrow-btn" style={{width:28, height:28, fontSize:11}}>←</button>
          <span>Month · Week · List</span>
          <button className="arrow-btn" style={{width:28, height:28, fontSize:11}}>→</button>
        </div>
      </div>
      <div className="calendar">
        <div className="cal-dow">
          <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
        </div>
        <div className="cal-grid">
          {days.map((cell, i) => {
            if (cell.empty) return <div key={i} className="day empty"></div>;
            const ev = events[cell.d];
            return (
              <div key={i} className={`day ${ev ? 'has-event':''}`}>
                <div className="n">{cell.d}</div>
                {ev && (
                  <>
                    <span className={`ev-dot ${ev.kind === 'warm' ? 'warm' : ev.kind === 'crit' ? 'crit' : ''}`}></span>
                    <div className="ev-label">{ev.title}</div>
                    <div className="hover-card">
                      <div className="media sk-stripes">
                        {ev.media === 'video' && <div className="play">▶</div>}
                        <div style={{position:'absolute', top:6, left:8, fontFamily:'JetBrains Mono', fontSize:9, color:'rgba(0,0,0,0.55)', letterSpacing:'.1em'}}>
                          [ {ev.media === 'video' ? 'VIDEO' : 'PHOTO'} ]
                        </div>
                      </div>
                      <h6>{ev.title}</h6>
                      <div className="when">{ev.when}</div>
                      <div className="text">{ev.note}</div>
                      <a className="mono" href="#" style={{fontSize:10, color:'var(--accent)', display:'inline-block', marginTop:6, letterSpacing:'.1em'}}>EVENT DETAILS →</a>
                    </div>
                  </>
                )}
              </div>
            );
          })}
        </div>
      </div>
      <div className="cal-legend">
        <div><span className="swatch" style={{background:'var(--accent)'}}></span>Academic</div>
        <div><span className="swatch" style={{background:'var(--accent-warm)'}}></span>Community</div>
        <div><span className="swatch" style={{background:'var(--crit)'}}></span>Major event</div>
        <div style={{marginLeft:'auto'}} className="hand">try hovering ↑</div>
      </div>
    </section>
  );
}

function App(){
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const cls = [
    t.stripped ? 'stripped' : '',
    t.monochrome ? 'mono-only' : '',
  ].join(' ');
  return (
    <div className={`page ${cls}`}>
      <Header/>
      <Hero layout={t.heroLayout} ctaStyle={t.ctaStyle} showAnnotations={t.showAnnotations}/>
      <About/>
      <News layout={t.newsLayout}/>
      <Academic/>
      <Calendar/>
      <Contact/>
      <DevelopedBy/>
      <Footer/>

      <TweaksPanel title="Wireframe Tweaks">
        <TweakSection label="Hero" />
        <TweakRadio label="CTA anchor" value={t.heroLayout} options={[
          { value:'bottom-left', label:'Bottom-left' },
          { value:'centered', label:'Centered' },
        ]} onChange={v => setTweak('heroLayout', v)} />
        <TweakRadio label="CTA shape" value={t.ctaStyle} options={[
          { value:'stacked', label:'Side-by-side' },
          { value:'split', label:'Stacked' },
        ]} onChange={v => setTweak('ctaStyle', v)} />

        <TweakSection label="News" />
        <TweakRadio label="Layout" value={t.newsLayout} options={[
          { value:'carousel', label:'Carousel' },
          { value:'grid', label:'3-up grid' },
        ]} onChange={v => setTweak('newsLayout', v)} />

        <TweakSection label="Mode" />
        <TweakToggle label="Hero annotations" value={t.showAnnotations} onChange={v => setTweak('showAnnotations', v)} />
        <TweakToggle label="Strip color" value={t.stripped} onChange={v => setTweak('stripped', v)} />
        <TweakToggle label="Monochrome accents" value={t.monochrome} onChange={v => setTweak('monochrome', v)} />
      </TweaksPanel>
    </div>
  );
}
