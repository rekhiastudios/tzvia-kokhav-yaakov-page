<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Ulpenat Tzvia — Wireframe v4 · Institutional / Editorial</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Secular+One&family=Inter:wght@300;400;500;600;700&family=Bebas+Neue&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root{
    /* LIGHT zone (default — everything after hero) */
    --bg:        #fafaf6;     /* nearly white, faint warmth */
    --bg-2:      #ffffff;     /* card / surface */
    --bg-3:      #f1efe7;     /* slightly darker neutral */
    --shadow-sm: 0 1px 0 rgba(0,11,33,0.04), 0 6px 16px -8px rgba(0,11,33,0.10);
    --shadow-md: 0 1px 0 rgba(0,11,33,0.05), 0 14px 32px -16px rgba(0,11,33,0.14);
    --ink:       #000b21;     /* deep navy from Figma */
    --ink-soft:  #2a3754;     /* softer navy */
    --ink-mute:  #6c7388;     /* muted */
    --line:      rgba(0,11,33,0.10);
    --line-2:    rgba(0,11,33,0.20);
    --line-3:    rgba(0,11,33,0.35);
    --gold:      #eca948;     /* Figma gold */
    --gold-deep: #c98f2c;
  }
  /* DARK zone — hero + footer */
  .zone-dark{
    --bg:        #000b21;
    --bg-2:      #061634;
    --bg-3:      #0c1f44;
    --ink:       #ffffff;
    --ink-soft:  rgba(255,255,255,0.82);
    --ink-mute:  rgba(255,255,255,0.5);
    --line:      rgba(255,255,255,0.10);
    --line-2:    rgba(255,255,255,0.22);
    --line-3:    rgba(255,255,255,0.35);
  }

  *{box-sizing:border-box}
  html,body{ margin:0; padding:0; background: var(--bg); color: var(--ink); scroll-behavior: smooth;}
  body{
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 15px;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    line-height: 1.55;
  }
  .display{ font-family: 'Secular One', sans-serif; font-weight: 400; letter-spacing: -0.01em;}
  .bebas{ font-family: 'Bebas Neue', sans-serif; letter-spacing: .18em;}
  .inst{ font-family: 'Instrument Sans', sans-serif;}

  /* PAGE — wider, less side padding */
  .page{ padding: 0 56px;}
  @media (max-width: 900px){ .page{ padding: 0 24px;}}
  section{ padding-top: 120px;}

  /* ── SECTION HEADER, CITYPUNKS-STYLE ───────────────────────── */
  .sect-hd{
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: end;
    gap: 32px;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--line-2);
    margin-bottom: 56px;
  }
  .sect-hd .num{
    font-family:'Bebas Neue', sans-serif; font-size: 13px;
    letter-spacing: .32em;
    color: var(--gold);
    display:flex; align-items:center; gap: 12px;
    margin-bottom: 18px;
  }
  .sect-hd .num::before{ content:'//'; opacity: .6;}
  .sect-hd h2{
    font-family:'Secular One', sans-serif;
    font-weight: 400;
    font-size: clamp(48px, 6vw, 88px);
    line-height: 0.95;
    letter-spacing: -0.015em;
    color: var(--ink);
    margin: 0;
    text-transform: uppercase;
  }
  .sect-hd h2 .gold{ color: var(--gold);}
  .sect-hd h2 .stop{ color: var(--gold);}
  .sect-hd .meta{
    text-align: right;
    font-family:'Instrument Sans', sans-serif;
    font-size: 12px; font-weight: 500;
    color: var(--ink-mute);
    letter-spacing: .16em;
    text-transform: uppercase;
    line-height: 1.7;
    padding-bottom: 8px;
  }
  .sect-hd .meta b{ color: var(--ink); font-weight: 600;}

  /* ── ANNOUNCEMENT STRIP ───────────────────────────────────── */
  .announce{
    position: absolute; top: 0; left: 0; right: 0;
    z-index: 12;
    padding: 12px 56px;
    background: rgba(0,11,33,0.6);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex; justify-content: center; align-items: center; gap: 18px;
    font-family:'Instrument Sans', sans-serif;
    font-size: 12px; font-weight: 500;
    color: rgba(255,255,255,0.85);
    letter-spacing: .14em; text-transform: uppercase;
  }
  .announce::before{
    content:'//'; color: var(--gold); margin-right: 4px; opacity: .8;
  }
  .announce a{
    color: var(--gold); text-decoration: none;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .announce a .arr{ transition: transform .14s;}
  .announce a:hover .arr{ transform: translateX(4px);}

  /* ── TOP NAV (floats over hero) ───────────────────────────── */
  .topnav{
    position: absolute; top: 56px; left: 0; right: 0;
    z-index: 10;
    display: grid; grid-template-columns: auto 1fr auto;
    align-items: center;
    padding: 0 56px;
    gap: 32px;
  }
  .topnav .brand{
    font-family:'Secular One', sans-serif;
    font-size: 22px;
    color: #ffffff;
    letter-spacing: .04em;
    text-transform: uppercase;
  }
  .topnav .brand .b{ color: var(--gold);}
  .topnav nav{
    display: flex; justify-content: center; gap: 42px;
  }
  .topnav nav a{
    font-family:'Instrument Sans', sans-serif;
    font-size: 12px; font-weight: 500;
    letter-spacing: .26em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.78);
    text-decoration: none;
    padding: 6px 0;
    position: relative;
    transition: color .14s;
  }
  .topnav nav a::before{
    content:'·'; position:absolute;
    left: 50%; bottom: -10px; transform: translateX(-50%);
    color: var(--gold); opacity: 0;
    transition: opacity .18s;
    font-size: 16px; line-height: 0;
  }
  .topnav nav a:hover{ color: #fff;}
  .topnav nav a:hover::before, .topnav nav a.active::before{ opacity: 1;}
  .topnav nav a.active{ color: #fff;}
  .topnav .right{ display: flex; gap: 18px; align-items: center; justify-content: flex-end;}
  .lang-toggle{
    font-family:'Instrument Sans', sans-serif;
    font-size: 12px; font-weight: 500;
    color: rgba(255,255,255,0.7);
    letter-spacing: .2em; text-transform: uppercase;
    cursor: pointer;
    transition: color .14s;
  }
  .lang-toggle:hover{ color: #fff;}
  .btn-pill{
    background: var(--gold);
    color: #000b21;
    border: none;
    padding: 11px 22px;
    border-radius: 999px;
    font-family:'Instrument Sans', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: .22em;
    text-transform: uppercase;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 10px;
    transition: background .14s, transform .14s, box-shadow .14s;
  }
  .btn-pill:hover{
    background: #f5b860;
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(236,169,72,0.35);
  }
  .btn-pill .arr{ font-family:'Inter'; font-weight: 400; font-size: 14px;}

  /* ── HERO — full bleed, CITYPUNKS layout, navy ────────────── */
  .hero{
    position: relative;
    width: 100%;
    height: 100vh;
    min-height: 720px;
    overflow: hidden;
    background: var(--bg);
  }
  .hero .video-ph{
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 30% 70%, rgba(236,169,72,0.08), transparent 55%),
      radial-gradient(ellipse at 70% 25%, rgba(99,131,177,0.10), transparent 55%),
      radial-gradient(ellipse at 50% 100%, rgba(236,169,72,0.06), transparent 70%),
      #000b21;
  }
  /* subtle micro-grid for texture only */
  .hero .video-ph::before{
    content:''; position:absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 80px 80px;
    opacity: .5;
    mask-image: radial-gradient(circle at 50% 50%, black 30%, transparent 90%);
  }
  /* gradient overlay for text legibility */
  .hero .video-ph::after{
    content:''; position:absolute; inset: 0;
    background:
      linear-gradient(180deg, rgba(0,11,33,0.7) 0%, rgba(0,11,33,0.15) 20%, rgba(0,11,33,0.15) 55%, rgba(0,11,33,0.92) 100%);
  }
  .hero .vlabel{
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-family:'Instrument Sans', sans-serif; font-size: 11px;
    color: rgba(255,255,255,0.32);
    letter-spacing: .36em; text-transform: uppercase;
    text-align: center; line-height: 2;
    z-index: 1;
  }
  .hero .vlabel b{
    display: block; font-family:'Bebas Neue', sans-serif;
    font-size: 14px; color: rgba(255,255,255,0.55);
    letter-spacing: .26em; font-weight: 400;
    margin-bottom: 4px;
  }

  /* CITYPUNKS-style content stack at bottom-left */
  .hero-content{
    position: absolute; left: 56px; right: 56px; bottom: 56px;
    z-index: 5;
  }
  .hero-content .copy{ max-width: 640px;}
  .hero-content .kicker{
    font-family:'Bebas Neue', sans-serif;
    font-size: 11px;
    letter-spacing: .34em;
    color: rgba(255,255,255,0.78);
    margin-bottom: 18px;
    display: inline-flex; align-items: center; gap: 12px;
  }
  .hero-content .kicker::before{
    content:''; display: inline-block; width: 28px; height: 1px;
    background: var(--gold);
  }
  .hero-content .kicker .b{ color: var(--gold);}
  .hero-content h1{
    font-family:'Secular One', sans-serif;
    font-weight: 400;
    font-size: clamp(34px, 3.8vw, 56px);
    line-height: 0.95;
    letter-spacing: -0.018em;
    text-transform: uppercase;
    margin: 0 0 28px;
    color: #ffffff;
    max-width: 640px;
    text-wrap: balance;
  }
  .hero-content h1 .l2{ display: block; color: rgba(255,255,255,0.92);}
  .hero-content h1 span{ display: block;}
  .hero-content h1 .gold{ color: var(--gold); position: relative;}
  /* subtle underline highlight on accent line */
  .hero-content h1 .gold::after{
    content:''; position: absolute; left: 0; right: 0; bottom: -4px;
    height: 3px; background: var(--gold);
    opacity: 0.22;
  }
  .hero-content h1 .stop{ color: var(--gold);}
  .hero-content .sub{
    font-family:'Inter', sans-serif;
    font-size: 17px; font-weight: 300;
    color: rgba(255,255,255,0.75);
    max-width: 540px; line-height: 1.6;
    margin: 0 0 40px;
  }
  .hero-cta{ display: flex; gap: 22px; align-items: center;}
  .hero-cta .play-circle{
    width: 36px; height: 36px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.4);
    display: inline-flex; align-items: center; justify-content: center;
    color: #fff; font-size: 10px;
    transition: border-color .14s, background .14s;
  }
  .hero-cta .ghost{
    background: transparent; border: none;
    color: rgba(255,255,255,0.85);
    font-family:'Instrument Sans', sans-serif;
    font-size: 11px; font-weight: 500;
    letter-spacing: .22em; text-transform: uppercase;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 12px;
    padding: 6px 4px;
    transition: color .14s;
  }
  .hero-cta .ghost:hover{ color: var(--gold);}
  .hero-cta .ghost:hover .play-circle{ border-color: var(--gold); background: rgba(236,169,72,0.1);}

  /* small right side platform-style strip (like CITYPUNKS PC PS5 XBOX) */
  .hero-side{
    align-self: end;
    text-align: right;
    font-family:'Bebas Neue', sans-serif;
    font-size: 12px;
    letter-spacing: .34em;
    color: rgba(255,255,255,0.55);
    line-height: 1.9;
  }
  .hero-side .row{ display: flex; gap: 18px; justify-content: flex-end;}
  .hero-side .row .lbl{ color: rgba(255,255,255,0.32);}
  .hero-side .row .v{ color: rgba(255,255,255,0.78);}

  /* hero footer thin line at very bottom */
  .hero-foot{
    position: absolute; left: 56px; right: 56px; bottom: 22px;
    z-index: 6;
    display: flex; justify-content: space-between; align-items: center;
    font-family:'Instrument Sans', sans-serif;
    font-size: 11px; font-weight: 500;
    color: rgba(255,255,255,0.4);
    letter-spacing: .22em; text-transform: uppercase;
  }
  .hero-foot .scrl{ display: flex; align-items: center; gap: 14px;}
  .hero-foot .scrl::before{
    content:''; display:inline-block; width: 24px; height: 1px;
    background: rgba(255,255,255,0.4);
    animation: scrollHint 2.6s ease-in-out infinite;
  }
  @keyframes scrollHint{
    0%, 100%{ transform: scaleX(1); opacity: .35;}
    50%{ transform: scaleX(2.2); opacity: 1;}
  }
  .hero-foot .platforms{ display:flex; gap: 24px;}
  .hero-foot .platforms span{ color: rgba(255,255,255,0.55);}

  /* ── placeholders (wireframe) ─────────────────────────────── */
  .ph{
    background: var(--bg-3);
    border: 1px solid var(--line);
    position: relative;
    overflow: hidden;
  }
  .ph::before{
    content:''; position:absolute; inset:0;
    background-image: linear-gradient(135deg, transparent 49.5%, rgba(0,11,33,0.04) 49.5% 50.5%, transparent 50.5%);
    background-size: 28px 28px;
  }
  .ph .ph-label{
    position: relative; z-index: 1;
    height: 100%; width: 100%;
    display:flex; flex-direction: column; align-items: center; justify-content: center;
    color: var(--ink-mute);
    font-family:'Bebas Neue', sans-serif;
    font-size: 14px; letter-spacing: .22em;
    text-align: center; gap: 4px;
  }
  .ph .ph-label .sub{
    font-family:'Inter', sans-serif; font-weight: 300;
    font-size: 11px; letter-spacing: .04em; text-transform: none;
    opacity: .7;
  }
  .ph .ph-corner{
    position: absolute; top: 12px; left: 14px;
    font-family:'Instrument Sans', sans-serif;
    font-size: 10px; color: var(--ink-mute);
    letter-spacing: .18em; text-transform: uppercase;
    z-index: 2;
  }
  .ph .ph-dims{
    position: absolute; bottom: 12px; right: 14px;
    font-family:'Instrument Sans', sans-serif;
    font-size: 10px; color: var(--ink-mute); opacity: .7;
    letter-spacing: .08em;
    z-index: 2;
  }
  /* dark variant placeholder for use over navy bg */
  .zone-dark .ph{ background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.12);}
  .zone-dark .ph::before{ background-image: linear-gradient(135deg, transparent 49.5%, rgba(255,255,255,0.05) 49.5% 50.5%, transparent 50.5%);}
  .zone-dark .ph .ph-label{ color: rgba(255,255,255,0.5);}
  .zone-dark .ph .ph-corner, .zone-dark .ph .ph-dims{ color: rgba(255,255,255,0.45);}

  /* ── ABOUT ───────────────────────────────────────────────── */
  .about{
    display: grid; grid-template-columns: 1fr 1.05fr; gap: 80px;
    align-items: start;
  }
  .about-copy h3{
    font-family:'Secular One', sans-serif; font-weight: 400;
    font-size: clamp(36px, 3.4vw, 52px);
    line-height: 1.0; letter-spacing: -0.018em;
    text-transform: uppercase;
    color: var(--ink);
    margin: 0 0 30px;
    max-width: 580px;
  }
  .about-copy h3 .gold{ color: var(--gold);}
  .about-copy .lede{
    font-size: 18px; line-height: 1.55; color: var(--ink);
    font-weight: 400;
    max-width: 560px; margin: 0 0 24px;
  }
  .about-copy .body{
    color: var(--ink-soft); font-size: 14px; line-height: 1.7;
    max-width: 540px;
  }
  .about-copy .body p{ margin: 0 0 14px;}
  .about-copy .body .pull{
    margin: 28px 0;
    padding: 18px 0 18px 24px;
    border-left: 2px solid var(--gold);
    color: var(--ink);
    font-family:'Secular One', sans-serif;
    font-size: 22px; line-height: 1.3; font-weight: 400;
    letter-spacing: -0.008em;
    max-width: 480px;
  }
  .about-copy .body .pull .who{
    display:block;
    font-family:'Bebas Neue', sans-serif;
    font-size: 12px; color: var(--ink-mute);
    letter-spacing: .26em; text-transform: uppercase;
    margin-top: 12px;
  }
  .stats-row{
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 0;
    margin-top: 44px;
    border-top: 1px solid var(--line-2);
    border-bottom: 1px solid var(--line-2);
  }
  .stat-il{
    padding: 24px 24px 22px 0;
    border-right: 1px solid var(--line);
  }
  .stat-il:last-child{ border-right: none;}
  .stat-il .n{
    font-family:'Secular One', sans-serif; font-weight: 400;
    font-size: 52px; line-height: 1;
    color: var(--ink); letter-spacing: -0.02em;
  }
  .stat-il .n .u{ font-size: 18px; color: var(--gold); margin-left: 4px;}
  .stat-il .l{
    font-family:'Bebas Neue', sans-serif; font-size: 12px;
    color: var(--ink-mute); letter-spacing: .26em; text-transform: uppercase;
    margin-top: 12px;
  }
  .about-imgs{
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 300px 220px;
    gap: 14px;
  }
  .about-imgs .ph.big{ grid-column: 1 / 3;}

  /* ── NEWS GRID ───────────────────────────────────────────── */
  .news-grid{
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px;
  }
  .news-card{
    background: var(--bg-2);
    border: 1px solid var(--line);
    box-shadow: var(--shadow-sm);
    display: flex; flex-direction: column;
    cursor: pointer;
    transition: transform .2s ease, border-color .18s, box-shadow .2s;
    position: relative;
  }
  .news-card:hover{ transform: translateY(-3px); border-color: var(--gold); box-shadow: var(--shadow-md);}
  .news-card .thumb{
    height: 220px;
    border-bottom: 1px solid var(--line);
  }
  .news-card .body{
    padding: 22px 22px 26px;
    display: flex; flex-direction: column; gap: 14px;
    flex: 1;
  }
  .news-card .meta{
    display: flex; gap: 14px; align-items: center;
    font-family:'Bebas Neue', sans-serif;
    font-size: 12px; color: var(--ink-mute);
    letter-spacing: .24em; text-transform: uppercase;
  }
  .news-card .meta .tag{
    background: rgba(236,169,72,0.18);
    color: var(--gold-deep);
    padding: 3px 10px;
    border-radius: 99px;
    font-weight: 400;
  }
  .news-card h4{
    font-family:'Secular One', sans-serif; font-weight: 400;
    font-size: 22px; line-height: 1.15;
    text-transform: uppercase;
    letter-spacing: -0.008em;
    color: var(--ink);
    margin: 0;
  }
  .news-card .ex{
    font-size: 13px; color: var(--ink-soft);
    line-height: 1.55; margin: 0;
    flex: 1;
  }
  .news-card .read{
    font-family:'Bebas Neue', sans-serif;
    font-size: 12px; color: var(--gold-deep);
    letter-spacing: .26em; text-transform: uppercase;
    text-decoration: none;
    display: inline-flex; align-items: center; gap: 10px;
    margin-top: 4px;
  }
  .news-card .read .arr{ transition: transform .14s; font-family: 'Inter';}
  .news-card:hover .read .arr{ transform: translateX(5px);}

  .news-foot{
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 36px;
    font-family:'Instrument Sans', sans-serif;
    font-size: 12px; font-weight: 500;
    color: var(--ink-mute);
    letter-spacing: .16em; text-transform: uppercase;
  }
  .news-foot .more-link{
    color: var(--ink); text-decoration: none;
    display: inline-flex; align-items: center; gap: 12px;
    font-family:'Bebas Neue', sans-serif;
    font-size: 14px; letter-spacing: .28em;
    padding: 12px 22px;
    border: 1px solid var(--ink);
    border-radius: 99px;
    transition: background .14s, color .14s;
  }
  .news-foot .more-link:hover{ background: var(--ink); color: var(--bg);}

  /* ── ACADEMICS ─────────────────────────────────────────── */
  .acad{
    display: grid; grid-template-columns: 1fr 1.15fr; gap: 64px;
    align-items: start;
  }
  .acad-intro h3{
    font-family:'Secular One', sans-serif; font-weight: 400;
    font-size: clamp(32px, 3.2vw, 48px);
    line-height: 1.02; letter-spacing: -0.012em;
    text-transform: uppercase;
    color: var(--ink); margin: 0 0 22px;
  }
  .acad-intro h3 .gold{ color: var(--gold);}
  .acad-intro p{
    font-size: 16px; color: var(--ink-soft);
    line-height: 1.6; margin: 0 0 26px;
    max-width: 460px; font-weight: 400;
  }
  .acad-intro .acad-media{ height: 300px; margin-top: 18px;}
  .acad-list{
    border-top: 1px solid var(--line-2);
  }
  .acad-row{
    display: grid; grid-template-columns: 80px 1fr auto;
    gap: 32px;
    padding: 28px 0;

  t.accent === 'navy' ? 'accent-navy' : ''].
  filter(Boolean).join(' ');

  return (
    <div className={classes}>
      <Hero h1Variant={t.h1Variant} showSide={t.showSide} />
      <div className="page">
        <About />
        <News />
        <Academics />
        <Calendar />
        <Contact />
      </div>
      <DevBy />
      <FooterBig />

      <TweaksPanel title="Tweaks · Wireframe v4">
        <TweakSection label="Hero" />
        <TweakRadio label="H1 Variant"
        value={t.h1Variant}
        options={['scholarship', 'excellence', 'legacy']}
        onChange={(v) => setTweak('h1Variant', v)} />
        <TweakToggle label="Side readouts"
        value={t.showSide}
        onChange={(v) => setTweak('showSide', v)} />

        <TweakSection label="Aesthetic" />
        <TweakRadio label="Accent"
        value={t.accent}
        options={['gold', 'deep-gold', 'navy']}
        onChange={(v) => setTweak('accent', v)} />
        <TweakRadio label="Density"
        value={t.density}
        options={['tight', 'regular', 'airy']}
        onChange={(v) => setTweak('density', v)} />
      </TweaksPanel>
    </div>);

}
