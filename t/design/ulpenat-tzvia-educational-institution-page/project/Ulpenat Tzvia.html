<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Ulpenat Tzvia Kokhav Ya'akov</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root{
    --bg: #06080d;
    --bg-2: #0c1018;
    --bg-3: #11161f;
    --bg-4: #181e2a;
    --line: rgba(180,200,230,0.08);
    --line-2: rgba(180,200,230,0.16);
    --line-3: rgba(180,200,230,0.28);
    --fg: #e7ecf4;
    --fg-soft: #9aa6b8;
    --fg-mute: #5a6478;
    --accent: #f4c46c;
    --accent-deep: #b87f1f;
    --accent-2: #6cf0e0;
    --warn: #ff7b6b;
    --good: #7ed957;
  }
  *{box-sizing:border-box}
  html,body{ margin:0; padding:0; background: var(--bg); color: var(--fg); scroll-behavior: smooth;}
  body{
    font-family: 'Space Grotesk', system-ui, sans-serif;
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
    background-image:
      radial-gradient(circle at 12% 4%, rgba(244,196,108,0.06), transparent 38%),
      radial-gradient(circle at 90% 84%, rgba(108,240,224,0.04), transparent 45%);
    background-attachment: fixed;
  }
  .mono{ font-family: 'JetBrains Mono', monospace; }
  .display{ font-family: 'Sora', sans-serif; letter-spacing: -0.02em; }
  ::selection{ background: var(--accent); color: #131722;}

  .page{ max-width: 1480px; margin: 0 auto; padding: 0 32px 0;}

  /* ── system bar ──────────────────────────────────────────────────── */
  .sysbar{
    display:flex; align-items:center; justify-content:space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--line);
    font-family:'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--fg-mute);
    letter-spacing: .08em;
  }
  .sysbar .L, .sysbar .R{ display:flex; gap: 22px; align-items:center;}
  .sysbar .chip{ color: var(--fg-soft);}
  .sysbar .live{
    display:inline-flex; align-items:center; gap: 8px;
    color: var(--accent);
  }
  .sysbar .live::before{
    content:''; width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot{ 0%,100%{opacity:1} 50%{opacity:.4} }
  .sysbar .pill{
    border: 1px solid var(--line-2); padding: 4px 10px; border-radius: 99px;
    color: var(--fg-soft);
  }

  /* ── topnav ──────────────────────────────────────────────────────── */
  .topnav{
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(14px);
    background: rgba(6,8,13,0.78);
    display: grid; grid-template-columns: auto 1fr auto;
    align-items: center;
    padding: 18px 0;
    border-bottom: 1px solid var(--line);
    gap: 28px;
  }
  .brand{ display:flex; align-items:center; gap: 12px; cursor: pointer;}
  .brand .logo-img{
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    filter: drop-shadow(0 0 12px rgba(244,196,108,0.2));
  }
  .brand .logo-img img{ width: 100%; height: 100%; object-fit: contain;}
  .brand-text .name{ font-family:'Sora', sans-serif; font-weight: 600; font-size: 15px; letter-spacing: -0.005em;}
  .brand-text .sub{ font-family:'JetBrains Mono', monospace; font-size: 10px; color: var(--fg-mute); letter-spacing: .15em;}
  .topnav nav{ display:flex; gap: 0; justify-content:center;}
  .topnav nav a{
    color: var(--fg-soft); text-decoration: none;
    padding: 10px 16px;
    font-size: 13px;
    border: 1px solid transparent;
    transition: color .14s, border-color .14s;
    display:flex; align-items:center; gap: 8px;
  }
  .topnav nav a:hover{ color: var(--fg);}
  .topnav nav a.active{ color: var(--fg); border-color: var(--line-2);}
  .topnav nav a .idx{ font-family:'JetBrains Mono', monospace; font-size: 9px; color: var(--fg-mute); letter-spacing: .12em;}
  .topnav .right{ display:flex; gap: 12px; align-items:center;}
  .lang{ font-family:'JetBrains Mono', monospace; font-size: 11px; padding: 7px 11px; border: 1px solid var(--line-2); color: var(--fg-soft); letter-spacing: .08em; cursor: pointer; transition: border-color .14s, color .14s;}
  .lang:hover{ border-color: var(--accent); color: var(--accent);}
  .btn-primary{
    background: var(--accent); color: #131722;
    border: 1px solid var(--accent);
    padding: 10px 18px;
    font-family:'Space Grotesk', sans-serif; font-weight: 600; font-size: 13px;
    display:inline-flex; align-items:center; gap: 8px; cursor:pointer;
    transition: background .14s, transform .14s, box-shadow .14s;
    position: relative;
  }
  .btn-primary:hover{ background: #ffd58c; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(244,196,108,0.25);}
  .btn-primary .arrow{ font-family:'JetBrains Mono', monospace; font-size: 14px;}

  /* ── section header ─────────────────────────────────────────────── */
  section{ margin-top: 80px;}
  .sect-meta{
    display:flex; gap: 18px; align-items: baseline;
    font-family:'JetBrains Mono', monospace; font-size: 11px;
    color: var(--fg-mute); letter-spacing: .16em; text-transform: uppercase;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 28px;
  }
  .sect-meta .idx{ color: var(--accent);}
  .sect-meta .title{ color: var(--fg); letter-spacing: .22em;}
  .sect-meta .spec{ margin-left:auto; color: var(--fg-mute); letter-spacing: .12em;}

  /* corner ticks */
  .ticks{ position: relative;}
  .ticks > .t1, .ticks > .t2, .ticks > .t3, .ticks > .t4{
    position:absolute; width: 10px; height: 10px;
    border: 1px solid var(--accent); pointer-events: none;
  }
  .ticks > .t1{ top:-1px; left:-1px; border-right: none; border-bottom: none;}
  .ticks > .t2{ top:-1px; right:-1px; border-left: none; border-bottom: none;}
  .ticks > .t3{ bottom:-1px; left:-1px; border-right: none; border-top: none;}
  .ticks > .t4{ bottom:-1px; right:-1px; border-left: none; border-top: none;}

  /* image utility — applies grain + vignette + dark cast */
  .imgwrap{ position: relative; overflow: hidden; background: var(--bg-2);}
  .imgwrap > img{
    width: 100%; height: 100%; object-fit: cover; display:block;
    filter: brightness(0.78) saturate(0.95) contrast(1.05);
  }
  .imgwrap::after{
    content:''; position:absolute; inset:0; pointer-events: none;
    background:
      radial-gradient(circle at 50% 50%, transparent 50%, rgba(0,0,0,0.4) 100%);
  }
  .imgwrap.warm > img{ filter: brightness(0.7) sepia(.15) saturate(1.05) contrast(1.05);}

  /* ── HERO ─────────────────────────────────────────────────────────── */
  .hero{
    position: relative;
    height: 720px;
    border: 1px solid var(--line-2);
    overflow: hidden;
    background: #0a0c12;
    margin-top: 24px;
  }
  .hero .bg{
    position:absolute; inset:0;
  }
  .hero .bg img{
    width: 100%; height: 100%; object-fit: cover;
    filter: brightness(0.35) saturate(1.05) contrast(1.1);
    transform: scale(1.04);
    animation: kenburns 24s ease-in-out infinite alternate;
  }
  @keyframes kenburns{
    0%{ transform: scale(1.04) translateX(0); }
    100%{ transform: scale(1.10) translateX(-2%); }
  }
  .hero .bg::after{
    content:''; position:absolute; inset:0;
    background:
      linear-gradient(180deg, rgba(6,8,13,0.5) 0%, rgba(6,8,13,0.1) 30%, rgba(6,8,13,0.85) 100%),
      linear-gradient(90deg, rgba(6,8,13,0.7) 0%, transparent 50%);
  }
  .hero .grid-lines{
    position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 96px 96px;
    pointer-events: none;
    mask-image: radial-gradient(circle at 50% 50%, black 30%, transparent 80%);
  }
  .hero .corner-tl, .hero .corner-tr, .hero .corner-bl, .hero .corner-br{
    position:absolute; width: 24px; height: 24px; border-color: var(--accent);
    border-style: solid; border-width: 0;
  }
  .hero .corner-tl{ top: 20px; left: 20px; border-top-width:1px; border-left-width:1px;}
  .hero .corner-tr{ top: 20px; right:20px; border-top-width:1px; border-right-width:1px;}
  .hero .corner-bl{ bottom: 20px; left: 20px; border-bottom-width:1px; border-left-width:1px;}
  .hero .corner-br{ bottom: 20px; right:20px; border-bottom-width:1px; border-right-width:1px;}

  .hero .video-tag{
    position:absolute; top: 32px; left: 44px;
    font-family:'JetBrains Mono', monospace; font-size: 11px;
    color: var(--fg-soft); letter-spacing: .16em;
    display:flex; align-items:center; gap: 10px;
  }
  .hero .video-tag .rec{
    width: 8px; height: 8px; border-radius: 50%; background: var(--warn);
    box-shadow: 0 0 12px rgba(255,123,107,0.7);
    animation: pulse-dot 1.6s ease-in-out infinite;
  }
  .hero .telemetry{
    position:absolute; top: 32px; right: 44px;
    font-family:'JetBrains Mono', monospace; font-size: 10px;
    color: var(--fg-mute); letter-spacing: .12em;
    text-align: right; line-height: 1.85;
  }
  .hero .telemetry .k{ color: var(--accent-2);}
  .hero .telemetry .v{ color: var(--fg-soft);}

  .hero .scanline{
    position:absolute; top: 24%; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent 5%, rgba(244,196,108,0.4) 50%, transparent 95%);
  }
  .hero .scanline.b{ top: 76%; background: linear-gradient(90deg, transparent 5%, rgba(108,240,224,0.32) 50%, transparent 95%);}

  .hero .play-target{
    position:absolute; top: 42%; left: 56%;
    width: 84px; height: 84px;
    transform: translate(-50%, -50%);
  }
  .hero .play-target .ring1, .hero .play-target .ring2, .hero .play-target .ring3{
    position: absolute; inset: 0;
    border: 1px solid var(--accent);
    border-radius: 50%;
  }
  .hero .play-target .ring2{ inset: -16px; border-color: rgba(244,196,108,0.4);}
  .hero .play-target .ring3{ inset: -32px; border-color: rgba(244,196,108,0.18); animation: spin 18s linear infinite;}
  .hero .play-target .ring3::before{
    content:''; position:absolute; top: -3px; left: 50%; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; transform: translateX(-50%); box-shadow: 0 0 12px var(--accent);
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }
  .hero .play-target .play{
    position:absolute; top:50%; left:50%; transform: translate(-40%,-50%);
    color: var(--accent); font-size: 24px;
  }

  .hero-content{
    position: absolute; left: 44px; bottom: 44px; right: 44px;
    z-index: 2;
    display: grid; grid-template-columns: 1fr auto; gap: 24px; align-items: end;
  }
  .hero-content .kicker{
    font-family:'JetBrains Mono', monospace; font-size: 11px;
    letter-spacing: .26em; text-transform: uppercase;
    color: var(--accent);
    display:flex; align-items:center; gap: 12px;
    margin-bottom: 22px;
  }
  .hero-content .kicker::before{ content:''; display:inline-block; width: 24px; height: 1px; background: var(--accent);}
  .hero-content h1{
    font-family:'Sora', sans-serif; font-weight: 600;
    font-size: clamp(48px, 5.6vw, 78px);
    line-height: 0.98;
    letter-spacing: -0.028em;
    margin: 0 0 18px;
    max-width: 940px;
    text-shadow: 0 4px 30px rgba(0,0,0,0.55);
  }
  .hero-content h1 .a{ color: var(--accent); font-style: italic; font-weight: 500;}
  .hero-content .sub{
    font-size: 17px; color: var(--fg-soft);
    max-width: 580px; line-height: 1.5; margin: 0 0 28px;
  }
  .cta-cluster{ display:flex; gap: 12px; align-items:stretch;}
  .cta-register{
    background: var(--accent); color: #131722;
    padding: 16px 24px;
    font-family:'Space Grotesk', sans-serif; font-weight: 600;
    border: 1px solid var(--accent);
    cursor: pointer;
    display:flex; flex-direction: column; gap: 3px;
    min-width: 280px;
    transition: background .14s, transform .14s, box-shadow .14s;
  }
  .cta-register:hover{ background: #ffd58c; transform: translateY(-2px); box-shadow: 0 12px 32px rgba(244,196,108,0.3);}
  .cta-register .top{ display:flex; justify-content:space-between; align-items:center; gap: 18px;}
  .cta-register .ttl{ font-size: 15px;}
  .cta-register .arr{ font-family:'JetBrains Mono', monospace; font-size: 18px;}
  .cta-register .sub{
    font-family:'JetBrains Mono', monospace; font-size: 10px;
    color: rgba(19,23,34,0.7); letter-spacing: .14em; text-transform: uppercase;
  }
  .cta-trailer{
    background: rgba(15,18,26,0.6);
    backdrop-filter: blur(8px);
    border: 1px solid var(--line-3);
    padding: 14px 20px;
    color: var(--fg);
    min-width: 240px;
    cursor: pointer;
    display: grid; grid-template-columns: auto 1fr; gap: 14px; align-items: center;
    transition: border-color .14s, background .14s;
  }
  .cta-trailer:hover{ border-color: var(--accent-2); background: rgba(20,24,34,0.85);}
  .cta-trailer .play{
    width: 40px; height: 40px; border-radius: 50%;
    border: 1px solid var(--accent-2);
    display:flex; align-items:center; justify-content:center;
    color: var(--accent-2); font-size: 13px;
    background: rgba(108,240,224,0.06);
  }
  .cta-trailer .ttl{ font-weight: 500; font-size: 15px;}
  .cta-trailer .sub{ font-family:'JetBrains Mono', monospace; font-size: 10px; color: var(--fg-mute); letter-spacing: .14em;}

  .hero-side{
    display: flex; flex-direction: column; gap: 8px; align-self: end;
    font-family:'JetBrains Mono', monospace; font-size: 10px;
    color: var(--fg-mute); letter-spacing: .1em; text-align: right;
  }
  .hero-side .k{ color: var(--accent-2);}

  /* ── ABOUT ──────────────────────────────────────────────────────── */
  .about{
    display: grid; grid-template-columns: 1.05fr 1fr; gap: 48px;
    align-items: start;
  }
  .about h3{
    font-family:'Sora', sans-serif; font-weight: 600;
    font-size: clamp(36px, 3.3vw, 48px); line-height: 1.05;
    letter-spacing: -0.028em;
    margin: 0 0 22px; max-width: 600px;
  }
  .about h3 .a{ color: var(--accent); font-style: italic; font-weight: 500;}
  .about .lede{ font-size: 17px; line-height: 1.55; color: var(--fg-soft); max-width: 560px; margin: 0 0 18px;}
  .about .body{ color: var(--fg-mute); font-size: 14px; line-height: 1.7; max-width: 560px;}
  .about .body p{ margin: 0 0 12px;}
  .about .body .pull{
    border-left: 2px solid var(--accent);
    padding: 4px 0 4px 16px;
    margin: 18px 0;
    color: var(--fg);
    font-size: 16px; line-height: 1.5; font-style: italic;
    max-width: 480px;
  }
  .about .body .pull .who{
    display:block; font-style: normal; font-size: 11px;
    font-family:'JetBrains Mono', monospace;
    color: var(--fg-mute); letter-spacing: .14em; text-transform: uppercase;
    margin-top: 6px;
  }
  .stats{
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 0;
    margin-top: 30px;
    border: 1px solid var(--line-2);
    background: var(--bg-2);
  }
  .stat{
    padding: 22px 22px;
    border-right: 1px solid var(--line);
    position: relative;
  }
  .stat:last-child{ border-right: none;}
  .stat .l{ font-family:'JetBrains Mono', monospace; font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--fg-mute);}
  .stat .n{ font-family:'Sora', sans-serif; font-weight: 600; font-size: 40px; color: var(--fg); letter-spacing: -0.025em; margin-top: 6px; line-height: 1;}
  .stat .n .u{ font-size: 18px; color: var(--accent); margin-left: 4px; font-weight: 500;}
  .stat .delta{ font-family:'JetBrains Mono', monospace; font-size: 10px; color: var(--good); margin-top: 8px; letter-spacing: .1em;}
  .stat .delta.neutral{ color: var(--fg-mute);}

  .about-grid{
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 220px 220px;
    gap: 14px;
  }
  .about-grid .imgwrap.big{ grid-column: 1 / 3;}
  .about-grid .imgwrap .caption{
    position: absolute; bottom: 14px; left: 14px;
    font-family:'JetBrains Mono', monospace; font-size: 10px;
    color: var(--fg-soft); letter-spacing: .14em; text-transform: uppercase;
    background: rgba(6,8,13,0.7);
    padding: 5px 9px;
    z-index: 2;
    border: 1px solid var(--line-2);
  }

  /* ── NEWS ──────────────────────────────────────────────────────── */
  .news-rail{
    display:flex; gap: 16px; overflow-x: auto; padding: 2px 2px 20px;
    scroll-snap-type: x mandatory;
  }
  .news-rail::-webkit-scrollbar{ height: 4px;}
  .news-rail::-webkit-scrollbar-track{ background: var(--bg-2);}
  .news-rail::-webkit-scrollbar-thumb{ background: var(--line-3);}
  .news-card{
    flex: 0 0 360px;
    border: 1px solid var(--line-2);
    background: var(--bg-2);
    scroll-snap-align: start;
    display:flex; flex-direction: column;
    position: relative;
    transition: border-color .14s, transform .18s;
    overflow: hidden;
    cursor: pointer;
  }
  .news-card:hover{ border-color: var(--accent); transform: translateY(-3px);}
  .news-card .imgwrap{ height: 200px;}
  .news-card .imgwrap img{ transition: transform .5s ease;}
  .news-card:hover .imgwrap img{ transform: scale(1.05);}
  .news-card .body{
    padding: 20px 22px 24px;
    display:flex; flex-direction:column; gap: 11px; flex: 1;
  }
  .news-card .meta{
    display:flex; gap: 10px; align-items: center;
    font-family:'JetBrains Mono', monospace; font-size: 10px;
    color: var(--fg-mute); letter-spacing: .16em; text-transform: uppercase;
  }
  .news-card .meta .tag{
    color: var(--accent); border: 1px solid var(--line-2); padding: 3px 9px;
  }
  .news-card h4{
    font-family:'Sora', sans-serif; font-weight: 600;
    font-size: 20px; line-height: 1.2; margin: 0;
    letter-spacing: -0.014em;
  }
  .news-card .ex{
    font-size: 13px; color: var(--fg-soft); margin: 0; line-height: 1.55; flex: 1;
  }
  .news-card .read{
    margin-top: 6px;
    font-family:'JetBrains Mono', monospace; font-size: 11px;
    color: var(--accent); letter-spacing: .14em; text-transform: uppercase;
    text-decoration: none;
    display:inline-flex; align-items:center; gap: 8px;
  }
  .news-card .read .arr{ transition: transform .14s;}
  .news-card:hover .read .arr{ transform: translateX(5px);}
  .rail-foot{
    display:flex; justify-content: space-between; align-items: center;
    margin-top: 14px;
    font-family:'JetBrains Mono', monospace; font-size: 11px; color: var(--fg-mute);
    letter-spacing: .12em;
  }
  .rail-foot .progress{ flex: 1; max-width: 320px; height: 1px; background: var(--line); margin: 0 24px;}
  .rail-foot .progress .fill{ height: 100%; background: var(--accent); width: 38%; transition: width .3s;}
  .iconbtn{
    width: 38px; height: 38px;
    border: 1px solid var(--line-2);
    background: transparent; color: var(--fg-soft);
    cursor: pointer;
    font-family:'JetBrains Mono', monospace;
    transition: border-color .14s, color .14s, background .14s;
  }
  .iconbtn:hover{ border-color: var(--accent); color: var(--accent); background: rgba(244,196,108,0.04);}

  /* ── ACADEMIC ──────────────────────────────────────────────────── */
  .acad-hero{
    position: relative;
    height: 520px;
    border: 1px solid var(--line-2);
    overflow: hidden;
  }
  .acad-hero .bg{ position:absolute; inset:0;}
  .acad-hero .bg img{
    width:100%; height:100%; object-fit: cover;
    filter: brightness(0.4) contrast(1.05);
    transform: scale(1.02);
  }
  .acad-hero .bg::after{
    content:''; position:absolute; inset:0;
    background: linear-gradient(180deg, rgba(6,8,13,0.4) 0%, transparent 30%, rgba(6,8,13,0.9) 100%);
  }
  .acad-hero .grid-overlay{
    position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .acad-hero .pulse{
    position:absolute; top: 30%; left: 64%;
    width: 130px; height: 130px;
    border: 1px solid var(--accent-2);
    border-radius: 50%;

/* ── APP ────────────────────────────────────────────────────────── */
function App(){
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const accentClass = t.accent === 'cyan' ? 'accent-cyan' : t.accent === 'violet' ? 'accent-violet' : '';
  const modeClass = t.mode === 'light' ? 'mode-light' : '';
  const densityClass = `density-${t.density}`;
  return (
    <div className={`page ${accentClass} ${modeClass} ${densityClass}`}>
      <SysBar/>
      <TopNav/>
      <Hero ctaShape={t.ctaShape}/>
      <About/>
      <News layout={t.newsLayout}/>
      <Academic/>
      <Calendar/>
      <Contact/>
      <DevelopedBy/>
      <FooterBig/>

      <TweaksPanel title="Site Tweaks">
        <TweakSection label="Theme" />
        <TweakRadio label="Mode" value={t.mode} options={[
          { value:'dark', label:'Dark' },
          { value:'light', label:'Light' },
        ]} onChange={v=>setTweak('mode', v)} />
        <TweakRadio label="Accent" value={t.accent} options={[
          { value:'amber', label:'Amber' },
          { value:'cyan', label:'Cyan' },
          { value:'violet', label:'Violet' },
        ]} onChange={v=>setTweak('accent', v)} />

        <TweakSection label="Hero" />
        <TweakRadio label="CTA layout" value={t.ctaShape} options={[
          { value:'side', label:'Side-by-side' },
          { value:'stacked', label:'Stacked' },
        ]} onChange={v=>setTweak('ctaShape', v)} />

        <TweakSection label="News" />
        <TweakRadio label="Layout" value={t.newsLayout} options={[
          { value:'carousel', label:'Carousel' },
          { value:'grid', label:'3-up grid' },
        ]} onChange={v=>setTweak('newsLayout', v)} />

        <TweakSection label="Layout" />
        <TweakRadio label="Density" value={t.density} options={[
          { value:'compact', label:'Compact' },
          { value:'regular', label:'Regular' },
          { value:'loose', label:'Loose' },
        ]} onChange={v=>setTweak('density', v)} />
      </TweaksPanel>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
