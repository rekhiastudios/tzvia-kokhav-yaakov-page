<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Ulpenat Tzvia — Wireframe v3 · Editorial</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root{
    --bg: #0b0b0d;
    --bg-2: #131316;
    --bg-3: #1b1b1f;
    --line: rgba(236,232,222,0.07);
    --line-2: rgba(236,232,222,0.14);
    --line-3: rgba(236,232,222,0.26);
    --fg: #ece8df;
    --fg-soft: #a5a098;
    --fg-mute: #66635c;
    --accent: #c9a96a;       /* muted institutional gold */
    --accent-soft: rgba(201,169,106,0.18);
  }
  *{box-sizing:border-box}
  html,body{ margin:0; padding:0; background: var(--bg); color: var(--fg); scroll-behavior: smooth;}
  body{
    font-family: 'Manrope', system-ui, sans-serif;
    font-size: 15px; font-weight: 400;
    -webkit-font-smoothing: antialiased;
    line-height: 1.55;
  }
  .mono{ font-family: 'JetBrains Mono', monospace; }
  .serif{ font-family: 'Cormorant Garamond', serif; letter-spacing: -0.01em; }

  /* page wrapper — tighter side padding, wider max */
  .page{ max-width: 1680px; margin: 0 auto; padding: 0 24px 0;}

  /* hairline section separator + tiny index */
  section{ padding-top: 96px;}
  .sect-hd{
    display:grid; grid-template-columns: 120px 1fr auto; gap: 32px;
    align-items: baseline;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 56px;
  }
  .sect-hd .idx{
    font-family:'JetBrains Mono', monospace; font-size: 10px;
    color: var(--fg-mute); letter-spacing: .22em; text-transform: uppercase;
  }
  .sect-hd h2{
    font-family:'Cormorant Garamond', serif;
    font-weight: 400; font-size: clamp(38px, 4vw, 56px);
    line-height: 1.02; letter-spacing: -0.015em;
    margin: 0; color: var(--fg);
  }
  .sect-hd h2 em{ font-style: italic; color: var(--accent); font-weight: 400;}
  .sect-hd .spec{
    font-family:'JetBrains Mono', monospace; font-size: 10px;
    color: var(--fg-mute); letter-spacing: .14em; text-transform: uppercase;
    text-align: right;
    max-width: 280px;
    line-height: 1.7;
  }

  /* ── ANNOUNCEMENT STRIP ──────────────────────────────────────── */
  .announce{
    background: var(--bg-2);
    border-bottom: 1px solid var(--line);
    padding: 9px 24px;
    display:flex; justify-content:center; align-items:center; gap: 16px;
    font-family:'JetBrains Mono', monospace; font-size: 11px;
    color: var(--fg-soft); letter-spacing: .14em;
  }
  .announce .dot{
    display:inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 8px var(--accent);
  }
  .announce a{ color: var(--accent); text-decoration: none; display:inline-flex; align-items:center; gap: 8px;}
  .announce a .arr{ transition: transform .14s;}
  .announce a:hover .arr{ transform: translateX(4px);}

  /* ── TOPNAV (floats over hero) ───────────────────────────────── */
  .topnav{
    position: absolute;
    top: 38px; left: 0; right: 0;
    z-index: 10;
    display: grid; grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 0 40px;
    gap: 32px;
  }
  .topnav .brand{
    display:flex; align-items:center; gap: 12px;
  }
  .brand .mark{
    width: 38px; height: 38px;
    border: 1px solid rgba(236,232,222,0.4);
    display:flex; align-items:center; justify-content:center;
    color: var(--fg);
    font-family:'Cormorant Garamond', serif; font-style: italic;
    font-size: 22px;
  }
  .brand .txt{ line-height: 1.15;}
  .brand .name{
    font-family:'Cormorant Garamond', serif;
    font-weight: 500; font-size: 17px;
    color: var(--fg);
    letter-spacing: 0.01em;
  }
  .brand .sub{
    font-family:'JetBrains Mono', monospace; font-size: 9px;
    color: rgba(236,232,222,0.5); letter-spacing: .22em;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .topnav nav{
    display:flex; justify-content:center; gap: 36px;
  }
  .topnav nav a{
    color: rgba(236,232,222,0.85); text-decoration: none;
    font-size: 13px; font-weight: 400;
    letter-spacing: .02em;
    padding: 8px 0;
    position: relative;
    transition: color .14s;
  }
  .topnav nav a::after{
    content:''; position:absolute; bottom: 2px; left: 0; right: 0;
    height: 1px; background: var(--accent);
    transform: scaleX(0); transform-origin: left;
    transition: transform .22s ease;
  }
  .topnav nav a:hover{ color: var(--fg);}
  .topnav nav a:hover::after{ transform: scaleX(1);}
  .topnav nav a.active{ color: var(--fg);}
  .topnav nav a.active::after{ transform: scaleX(1); background: rgba(236,232,222,0.5);}
  .topnav .right{
    display:flex; gap: 14px; align-items:center; justify-content:flex-end;
  }
  .lang-toggle{
    font-family:'JetBrains Mono', monospace;
    font-size: 11px; color: rgba(236,232,222,0.7);
    letter-spacing: .14em; cursor: pointer;
    padding: 6px 0;
    transition: color .14s;
  }
  .lang-toggle:hover{ color: var(--fg);}
  .btn-register{
    background: transparent;
    color: var(--fg);
    border: 1px solid rgba(236,232,222,0.5);
    padding: 11px 22px;
    font-family:'Manrope', sans-serif; font-weight: 500; font-size: 13px;
    letter-spacing: .02em;
    display:inline-flex; align-items:center; gap: 10px;
    cursor: pointer;
    transition: background .18s, color .18s, border-color .18s;
  }
  .btn-register:hover{ background: var(--fg); color: #131316; border-color: var(--fg);}
  .btn-register .arr{ font-family:'JetBrains Mono', monospace;}

  /* ── HERO — full bleed 100vh ─────────────────────────────────── */
  .hero{
    position: relative;
    height: 100vh;
    min-height: 680px;
    width: 100%;
    overflow: hidden;
    background: #0a0a0d;
  }
  /* video placeholder — diagonal weave with a single small label */
  .hero .video-ph{
    position:absolute; inset:0;
    background:
      radial-gradient(circle at 25% 65%, rgba(201,169,106,0.06), transparent 55%),
      radial-gradient(circle at 75% 30%, rgba(255,255,255,0.04), transparent 55%),
      linear-gradient(135deg, transparent 49.5%, rgba(255,255,255,0.018) 49.5% 50.5%, transparent 50.5%),
      linear-gradient(45deg,  transparent 49.5%, rgba(255,255,255,0.018) 49.5% 50.5%, transparent 50.5%),
      #0c0c10;
    background-size: auto, auto, 42px 42px, 42px 42px;
  }
  .hero .video-ph::after{
    content:''; position:absolute; inset:0;
    background:
      linear-gradient(180deg, rgba(11,11,13,0.45) 0%, rgba(11,11,13,0.0) 25%, rgba(11,11,13,0.0) 60%, rgba(11,11,13,0.55) 100%);
  }
  .hero .video-label{
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-family:'JetBrains Mono', monospace; font-size: 11px;
    color: rgba(236,232,222,0.32); letter-spacing: .32em; text-transform: uppercase;
    text-align: center; line-height: 2;
  }
  .hero .video-label .big{
    display:block; font-size: 13px; color: rgba(236,232,222,0.55); margin-bottom: 4px;
  }

  .hero-content{
    position: absolute; left: 0; right: 0; bottom: 0;
    z-index: 5;
    padding: 0 40px 56px;
    display: grid; grid-template-columns: 1fr auto; gap: 48px;
    align-items: end;
  }
  .hero-content .copy{ max-width: 980px;}
  .hero-content .kicker{
    font-family:'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: .32em; text-transform: uppercase;
    color: rgba(236,232,222,0.65);
    margin-bottom: 26px;
    display:flex; align-items:center; gap: 14px;
  }
  .hero-content .kicker::before{
    content:''; display:inline-block; width: 32px; height: 1px;
    background: rgba(236,232,222,0.5);
  }
  .hero-content h1{
    font-family:'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: clamp(54px, 6.5vw, 102px);
    line-height: 0.98;
    letter-spacing: -0.022em;
    margin: 0 0 28px;
    color: var(--fg);
    max-width: 1100px;
  }
  .hero-content h1 em{ font-style: italic; color: var(--accent); font-weight: 400;}
  .hero-content .sub{
    font-size: 16px; color: rgba(236,232,222,0.75);
    line-height: 1.6; max-width: 520px;
    margin: 0 0 36px;
    font-weight: 300;
  }
  .hero-cta{
    display:flex; gap: 18px; align-items:center;
  }
  .hero-cta .primary{
    background: var(--fg); color: #131316;
    border: 1px solid var(--fg);
    padding: 15px 28px;
    font-family:'Manrope', sans-serif; font-weight: 600; font-size: 14px;
    letter-spacing: .01em;
    cursor: pointer;
    display:inline-flex; align-items:center; gap: 12px;
    transition: background .14s, transform .14s;
  }
  .hero-cta .primary:hover{ background: var(--accent); border-color: var(--accent); transform: translateY(-1px);}
  .hero-cta .primary .arr{ font-family:'JetBrains Mono', monospace;}
  .hero-cta .ghost{
    background: transparent; color: rgba(236,232,222,0.9);
    border: none;
    padding: 15px 8px;
    font-family:'Manrope', sans-serif; font-weight: 500; font-size: 14px;
    cursor: pointer;
    display:inline-flex; align-items:center; gap: 12px;
    transition: color .14s;
  }
  .hero-cta .ghost:hover{ color: var(--accent);}
  .hero-cta .ghost .icon{
    width: 30px; height: 30px; border-radius: 50%;
    border: 1px solid rgba(236,232,222,0.4);
    display:inline-flex; align-items:center; justify-content:center;
    font-size: 10px;
    transition: border-color .14s;
  }
  .hero-cta .ghost:hover .icon{ border-color: var(--accent);}

  .hero-side{
    align-self: end;
    text-align: right;
    font-family:'JetBrains Mono', monospace;
    font-size: 10px; color: rgba(236,232,222,0.45);
    letter-spacing: .16em; text-transform: uppercase;
    line-height: 1.9;
  }
  .hero-side .lab{ color: rgba(236,232,222,0.3); }

  .hero-foot{
    position: absolute; left: 40px; right: 40px; bottom: 16px;
    z-index: 6;
    display:flex; justify-content: space-between; align-items: center;
    font-family:'JetBrains Mono', monospace; font-size: 10px;
    color: rgba(236,232,222,0.4); letter-spacing: .18em; text-transform: uppercase;
  }
  .hero-foot .scrollhint{
    display:flex; align-items:center; gap: 12px;
  }
  .hero-foot .scrollhint::before{
    content:''; display:inline-block; width: 18px; height: 1px;
    background: rgba(236,232,222,0.4);
    animation: scrollHint 2.6s ease-in-out infinite;
  }
  @keyframes scrollHint{
    0%, 100% { transform: scaleX(1); opacity: .4;}
    50% { transform: scaleX(2); opacity: 1;}
  }

  /* placeholder utility — quieter, no diagonal-noise (we use plain) */
  .ph{
    background: var(--bg-2);
    border: 1px solid var(--line);
    position: relative;
    overflow: hidden;
  }
  .ph::before{
    content:'';
    position:absolute; inset:0;
    background-image:
      linear-gradient(135deg, transparent 49.5%, rgba(255,255,255,0.018) 49.5% 50.5%, transparent 50.5%);
    background-size: 28px 28px;
  }
  .ph .ph-label{
    position: relative; z-index: 1;
    height: 100%; width: 100%;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    color: var(--fg-mute);
    font-family:'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: .18em; text-transform: uppercase;
    gap: 6px;
    text-align: center;
  }
  .ph .ph-label .sub{ color: var(--fg-mute); letter-spacing: .08em; text-transform: none; font-size: 10px; opacity: .7;}
  .ph .ph-corner{
    position: absolute; top: 10px; left: 12px;
    color: var(--fg-mute);
    font-family:'JetBrains Mono', monospace; font-size: 9px;
    letter-spacing: .14em;
    z-index: 2;
  }
  .ph .ph-dims{
    position:absolute; bottom: 10px; right: 12px;
    color: var(--fg-mute); opacity: .7;
    font-family:'JetBrains Mono', monospace; font-size: 9px;
    letter-spacing: .08em;
    z-index: 2;
  }

  /* ── ABOUT ───────────────────────────────────────────────────── */
  .about{
    display: grid; grid-template-columns: 1fr 1.1fr; gap: 80px;
    align-items: start;
  }
  .about-copy h3{
    font-family:'Cormorant Garamond', serif;
    font-weight: 400; font-size: clamp(38px, 3.6vw, 54px);
    line-height: 1.02; letter-spacing: -0.018em;
    margin: 0 0 28px; max-width: 580px; color: var(--fg);
  }
  .about-copy h3 em{ font-style: italic; color: var(--accent); font-weight: 400;}
  .about-copy .lede{
    font-size: 18px; line-height: 1.55; color: var(--fg);
    font-weight: 300;
    max-width: 580px; margin: 0 0 24px;
  }
  .about-copy .body{
    color: var(--fg-soft); font-size: 14px; line-height: 1.7;
    max-width: 540px;
  }
  .about-copy .body p{ margin: 0 0 14px;}
  .about-copy .body .pull{
    border-left: 1px solid var(--accent);
    padding: 8px 0 8px 22px;
    margin: 26px 0;
    color: var(--fg);
    font-family:'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 22px; line-height: 1.35; font-weight: 400;
    max-width: 480px;
  }
  .about-copy .body .pull .who{
    display:block; font-style: normal;
    font-family:'JetBrains Mono', monospace; font-size: 10px;
    color: var(--fg-mute); letter-spacing: .18em; text-transform: uppercase;
    margin-top: 10px;
  }
  /* inline stats — no boxes, just hairlines */
  .stats-inline{
    display:flex; gap: 0; margin-top: 44px;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
  }
  .stat-il{
    flex: 1;
    padding: 22px 0 22px;
    padding-right: 24px;
    border-right: 1px solid var(--line);
  }
  .stat-il:last-child{ border-right: none;}
  .stat-il .n{
    font-family:'Cormorant Garamond', serif;
    font-weight: 400; font-size: 44px;
    color: var(--fg); letter-spacing: -0.02em; line-height: 1;
  }
  .stat-il .n .u{ font-size: 18px; color: var(--accent); margin-left: 4px;}
  .stat-il .l{
    font-family:'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: .16em; text-transform: uppercase; color: var(--fg-mute);
    margin-top: 10px;
  }
  .about-imgs{
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 280px 220px;
    gap: 14px;
  }
  .about-imgs .ph.big{ grid-column: 1 / 3;}

  /* ── NEWS — clean 4-up grid ─────────────────────────────────── */
  .news-grid{
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px;
  }
  .news-card{
    display:flex; flex-direction: column;
    background: transparent;
    cursor: pointer;
    transition: transform .2s ease;
  }
  .news-card:hover{ transform: translateY(-3px);}
  .news-card .thumb{ height: 220px;}
  .news-card .body{
    padding: 18px 0 0;
    display:flex; flex-direction: column; gap: 12px;
  }
  .news-card .meta{
    display:flex; gap: 14px; align-items: center;
    font-family:'JetBrains Mono', monospace; font-size: 10px;
    color: var(--fg-mute); letter-spacing: .16em; text-transform: uppercase;
  }
  .news-card .meta .tag{ color: var(--accent);}
  .news-card h4{
    font-family:'Cormorant Garamond', serif;
    font-weight: 500; font-size: 24px; line-height: 1.15;
    letter-spacing: -0.01em;
    margin: 0; color: var(--fg);
  }
  .news-card .ex{
    font-size: 13px; color: var(--fg-soft); line-height: 1.55;
    margin: 0; font-weight: 400;
  }
  .news-card .read{
    margin-top: 4px;
    font-family:'JetBrains Mono', monospace; font-size: 10px;
    color: var(--accent); letter-spacing: .16em; text-transform: uppercase;
    text-decoration: none;
    display:inline-flex; align-items:center; gap: 10px;
  }
  .news-card .read .arr{ transition: transform .14s;}
  .news-card:hover .read .arr{ transform: translateX(5px);}
  .news-foot{
    display:flex; justify-content: space-between; align-items: center;
    margin-top: 40px;
    padding-top: 22px;
    border-top: 1px solid var(--line);
    font-family:'JetBrains Mono', monospace; font-size: 10px;
    color: var(--fg-mute); letter-spacing: .16em; text-transform: uppercase;
  }
  .news-foot .more-link{
    color: var(--fg); text-decoration: none;
    display:inline-flex; align-items:center; gap: 10px;
    transition: color .14s;
  }
  .news-foot .more-link:hover{ color: var(--accent);}
  .news-foot .more-link .arr{ transition: transform .14s;}
  .news-foot .more-link:hover .arr{ transform: translateX(4px);}

  /* ── ACADEMICS ──────────────────────────────────────────────── */
  .acad{
    display: grid; grid-template-columns: 1fr 1.2fr; gap: 64px;
    align-items: start;
  }
  .acad-intro h3{
    font-family:'Cormorant Garamond', serif;
    font-weight: 400; font-size: clamp(34px, 3.2vw, 48px);
    line-height: 1.05; letter-spacing: -0.015em;
    margin: 0 0 22px; color: var(--fg);
  }
  .acad-intro h3 em{ font-style: italic; color: var(--accent); font-weight: 400;}
  .acad-intro p{
    font-size: 16px; color: var(--fg-soft); line-height: 1.6;
    margin: 0 0 26px; max-width: 460px; font-weight: 300;
  }
  .acad-intro .acad-media{ height: 280px; margin-top: 14px;}
  .acad-list{
    display:flex; flex-direction: column;
    border-top: 1px solid var(--line);
  }
  .acad-row{
    display: grid; grid-template-columns: 80px 1fr auto;
    gap: 32px;
    padding: 28px 6px;
    border-bottom: 1px solid var(--line);
    align-items: start;
    cursor: pointer;
    transition: background .16s, padding-left .2s;
    position: relative;
  }
  .acad-row::before{
    content:''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 2px; background: var(--accent);
    transform: scaleY(0); transform-origin: top;
    transition: transform .26s ease;
  }
  .acad-row:hover{ padding-left: 18px;}
  .acad-row:hover::before{ transform: scaleY(1);}
  .acad-row .id{
    font-family:'JetBrains Mono', monospace; font-size: 11px;
    color: var(--fg-mute); letter-spacing: .14em;
    padding-top: 8px;
  }
  .acad-row .body h5{
    font-family:'Cormorant Garamond', serif;
    font-weight: 400; font-size: 28px;
    color: var(--fg); margin: 0 0 6px; letter-spacing: -0.012em;
    line-height: 1.1;
  }
  .acad-row .body h5 em{ font-style: italic; color: var(--accent); font-weight: 400;}
  .acad-row .body .desc{
    font-size: 13px; color: var(--fg-soft); line-height: 1.55;
    margin: 0; max-width: 520px; font-weight: 400;
  }
  .acad-row .body .tags{
    display:flex; gap: 14px; margin-top: 12px;
    font-family:'JetBrains Mono', monospace; font-size: 9px;
    color: var(--fg-mute); letter-spacing: .16em; text-transform: uppercase;
  }
  .acad-row .arr{
    font-family:'JetBrains Mono', monospace; font-size: 14px;
    color: var(--fg-mute); padding-top: 8px;
    transition: color .14s, transform .14s;
  }
  .acad-row:hover .arr{ color: var(--accent); transform: translateX(5px);}

  /* ── CALENDAR ──────────────────────────────────────────────── */
  .cal-head{
    display: grid; grid-template-columns: 1fr auto auto; gap: 32px;
    align-items: center;
    margin-bottom: 28px;
  }
  .cal-head .month{
    font-family:'Cormorant Garamond', serif;
    font-weight: 400; font-size: 44px;
    letter-spacing: -0.015em; line-height: 1;
    color: var(--fg);
  }
  .cal-head .month .y{ color: var(--fg-mute); font-weight: 300; margin-left: 8px;}
  .cal-head .views{
    display:flex; gap: 0;
    font-family:'JetBrains Mono', monospace; font-size: 11px; letter-spacing: .14em;
    border: 1px solid var(--line-2);
  }
  .cal-head .views .v{
    padding: 10px 16px; color: var(--fg-mute); cursor: pointer;
    border-right: 1px solid var(--line);
    text-transform: uppercase;
    transition: color .14s, background .14s;
  }
  .cal-head .views .v:last-child{ border-right: none;}

  t.accent === 'rust' ? 'accent-rust' : ''].
  filter(Boolean).join(' ');

  return (
    <div className={classes}>
      <AnnounceStrip />
      <Hero showSide={t.showSide} />
      <div className="page">
        <About />
        <News />
        <Academics />
        <Calendar />
        <Contact />
        <DevBy />
        <FooterBig />
      </div>

      <TweaksPanel title="Tweaks · Wireframe v3">
        <TweakSection label="Aesthetic" />
        <TweakRadio label="Accent"
        value={t.accent}
        options={['gold', 'sage', 'rust']}
        onChange={(v) => setTweak('accent', v)} />
        <TweakRadio label="Mode"
        value={t.mode}
        options={['dark', 'light']}
        onChange={(v) => setTweak('mode', v)} />
        <TweakRadio label="Density"
        value={t.density}
        options={['tight', 'regular', 'airy']}
        onChange={(v) => setTweak('density', v)} />

        <TweakSection label="Hero" />
        <TweakToggle label="Side readouts"
        value={t.showSide}
        onChange={(v) => setTweak('showSide', v)} />
      </TweaksPanel>
    </div>);

}
