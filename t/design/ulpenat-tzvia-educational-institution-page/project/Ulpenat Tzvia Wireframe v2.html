<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Ulpenat Tzvia — Wireframe v2 · Tech</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&family=Sora:wght@500;600;700&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root{
    --bg: #07090f;
    --bg-2: #0c1018;
    --bg-3: #11161f;
    --line: rgba(180,200,230,0.10);
    --line-2: rgba(180,200,230,0.18);
    --line-3: rgba(180,200,230,0.30);
    --fg: #e3e9f2;
    --fg-soft: #9aa6b8;
    --fg-mute: #5a6578;
    --accent: #f4c46c;      /* amber — nods to the school's wheat gold */
    --accent-deep: #b87f1f;
    --accent-2: #6cf0e0;    /* cyan — terminal */
    --warn: #ff6b6b;
    --good: #7ed957;
  }
  *{box-sizing:border-box}
  html,body{ margin:0; padding:0; background: var(--bg); color: var(--fg);}
  body{
    font-family: 'Space Grotesk', system-ui, sans-serif;
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
    background-image:
      radial-gradient(circle at 12% 8%, rgba(244,196,108,0.045), transparent 40%),
      radial-gradient(circle at 92% 76%, rgba(108,240,224,0.04), transparent 45%),
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: auto, auto, 48px 48px, 48px 48px;
    background-attachment: fixed;
  }
  .mono{ font-family: 'JetBrains Mono', monospace; }
  .display{ font-family: 'Sora', sans-serif; letter-spacing: -0.02em; }

  /* page chrome */
  .page{ max-width: 1440px; margin: 0 auto; padding: 0 28px 80px;}
  .rule{ border: 1px solid var(--line); border-radius: 0; }

  /* ── chrome / system bar ──────────────────────────────────────────── */
  .sysbar{
    display:flex; align-items:center; justify-content:space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--line);
    font-family:'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--fg-mute);
    letter-spacing: .06em;
  }
  .sysbar .L, .sysbar .R{ display:flex; gap: 18px; align-items:center;}
  .sysbar .chip{ color: var(--fg-soft); }
  .sysbar .dot{ display:inline-block; width:6px; height:6px; border-radius:50%; background: var(--good); margin-right: 6px; box-shadow: 0 0 8px rgba(126,217,87,0.6); }
  .sysbar .pill{
    border: 1px solid var(--line-2); padding: 3px 9px; border-radius: 99px;
    color: var(--fg-soft);
  }

  /* topnav */
  .topnav{
    display: grid; grid-template-columns: auto 1fr auto;
    align-items: center;
    padding: 18px 0;
    border-bottom: 1px solid var(--line);
    gap: 28px;
  }
  .brand{ display:flex; align-items:center; gap: 12px;}
  .brand-mark{
    width: 36px; height: 36px;
    border: 1px solid var(--line-3);
    display:flex; align-items:center; justify-content:center;
    position:relative;
    background: linear-gradient(135deg, rgba(244,196,108,0.08), transparent 60%);
  }
  .brand-mark::before, .brand-mark::after{
    content:''; position:absolute; inset:-1px;
    border: 1px solid transparent;
  }
  .brand-mark::before{ border-top-color: var(--accent); border-left-color: var(--accent); width: 8px; height:8px; }
  .brand-mark::after{ border-bottom-color: var(--accent); border-right-color: var(--accent); width: 8px; height:8px; top:auto; left:auto; bottom:-1px; right:-1px;}
  .brand-mark .glyph{ color: var(--accent); font-family:'JetBrains Mono', monospace; font-size: 16px;}
  .brand-text .name{ font-family:'Sora', sans-serif; font-weight: 600; font-size: 16px; letter-spacing: -0.01em;}
  .brand-text .sub{ font-family:'JetBrains Mono', monospace; font-size: 10px; color: var(--fg-mute); letter-spacing: .15em;}
  .topnav nav{ display:flex; gap: 4px; justify-content:center;}
  .topnav nav a{
    color: var(--fg-soft); text-decoration: none;
    padding: 8px 14px;
    font-size: 13px; letter-spacing: -0.005em;
    border: 1px solid transparent;
    transition: color .12s, border-color .12s;
  }
  .topnav nav a:hover{ color: var(--fg); }
  .topnav nav a.active{ color: var(--fg); border-color: var(--line-2); }
  .topnav nav a .idx{
    font-family:'JetBrains Mono', monospace; font-size: 9px;
    color: var(--fg-mute); margin-right: 6px;
  }
  .topnav .right{ display:flex; gap: 10px; align-items:center;}
  .lang{
    font-family:'JetBrains Mono', monospace;
    font-size: 11px; padding: 6px 10px;
    border: 1px solid var(--line-2); color: var(--fg-soft);
    letter-spacing: .08em;
  }
  .btn-primary{
    background: var(--accent);
    color: #131722;
    border: 1px solid var(--accent);
    padding: 9px 16px;
    font-family:'Space Grotesk', sans-serif; font-weight: 600;
    font-size: 13px;
    display:inline-flex; align-items:center; gap: 8px;
    cursor:pointer;
    transition: background .12s, color .12s;
  }
  .btn-primary:hover{ background: #ffd58c; }
  .btn-primary .arrow{ font-family:'JetBrains Mono', monospace; font-size: 14px; }

  /* ── section header common ─────────────────────────────────────────── */
  section { margin-top: 56px; }
  .sect-meta{
    display:flex; gap: 16px; align-items: baseline;
    font-family:'JetBrains Mono', monospace; font-size: 11px;
    color: var(--fg-mute); letter-spacing: .14em; text-transform: uppercase;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 18px;
  }
  .sect-meta .idx{ color: var(--accent); }
  .sect-meta .title{ color: var(--fg); letter-spacing: .18em; }
  .sect-meta .spec{ margin-left:auto; color: var(--fg-mute); text-transform: none; letter-spacing: .06em;}
  .sect-meta .bracket::before{ content: '[ '; color: var(--fg-mute);}
  .sect-meta .bracket::after{ content: ' ]'; color: var(--fg-mute);}

  /* placeholder utilities */
  .ph{
    background: var(--bg-2);
    border: 1px solid var(--line);
    position: relative;
    overflow: hidden;
  }
  .ph::before{
    content:'';
    position:absolute; inset:0;
    background-image:
      linear-gradient(135deg, transparent 49%, rgba(255,255,255,0.025) 49% 51%, transparent 51%),
      linear-gradient(45deg, transparent 49%, rgba(255,255,255,0.025) 49% 51%, transparent 51%);
    background-size: 28px 28px;
  }
  .ph .ph-label{
    position: relative; z-index: 1;
    height: 100%; width: 100%;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    color: var(--fg-mute);
    font-family:'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: .18em; text-transform: uppercase;
    gap: 4px;
  }
  .ph .ph-label .sub{ color: var(--fg-mute); letter-spacing: .08em; text-transform: none; font-size: 10px;}
  .ph .ph-corner{
    position: absolute; top: 8px; left: 10px;
    color: var(--fg-mute);
    font-family:'JetBrains Mono', monospace; font-size: 9px;
    letter-spacing: .12em;
    z-index: 2;
  }
  .ph .ph-dims{
    position:absolute; bottom: 8px; right: 10px;
    color: var(--fg-mute);
    font-family:'JetBrains Mono', monospace; font-size: 9px;
    letter-spacing: .08em;
    z-index: 2;
  }

  /* corner ticks for cards */
  .ticks{ position: relative; }
  .ticks::before, .ticks::after,
  .ticks > .tc1, .ticks > .tc2{
    content:''; position: absolute; width: 8px; height: 8px; border: 1px solid var(--accent);
    pointer-events:none;
  }
  .ticks::before{ top: -1px; left: -1px; border-right: none; border-bottom: none;}
  .ticks::after{  top: -1px; right:-1px; border-left:  none; border-bottom: none;}
  .ticks > .tc1{ bottom:-1px; left: -1px; border-right: none; border-top: none;}
  .ticks > .tc2{ bottom:-1px; right:-1px; border-left:  none; border-top: none;}

  /* ── HERO ──────────────────────────────────────────────────────────── */
  .hero{
    position: relative;
    height: 640px;
    border: 1px solid var(--line-2);
    overflow: hidden;
    background: var(--bg-2);
  }
  .hero .video-ph{
    position:absolute; inset:0;
    background: radial-gradient(circle at 30% 60%, rgba(244,196,108,0.06), transparent 50%),
                radial-gradient(circle at 70% 30%, rgba(108,240,224,0.05), transparent 55%),
                #0a0d15;
  }
  .hero .hero-grid{
    position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
    background-size: 80px 80px;
  }
  .hero .crosshair{
    position:absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 180px; height: 180px;
  }
  .hero .crosshair::before, .hero .crosshair::after{
    content:''; position:absolute; background: rgba(244,196,108,0.4);
  }
  .hero .crosshair::before{ left: 50%; top: 0; width:1px; height:100%; transform: translateX(-0.5px);}
  .hero .crosshair::after{ top: 50%; left: 0; height:1px; width:100%; transform: translateY(-0.5px);}
  .hero .crosshair .ring{
    position:absolute; inset: 30%;
    border: 1px solid var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 24px rgba(244,196,108,0.25), inset 0 0 24px rgba(244,196,108,0.15);
  }
  .hero .crosshair .play-icon{
    position: absolute; top: 50%; left: 50%; transform: translate(-40%, -50%);
    color: var(--accent); font-size: 22px;
  }
  .hero .scanline{
    position:absolute; top: 22%; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(244,196,108,0.4), transparent);
  }
  .hero .scanline.b{ top: 78%; background: linear-gradient(90deg, transparent, rgba(108,240,224,0.3), transparent);}
  .hero .corner-tl, .hero .corner-tr, .hero .corner-bl, .hero .corner-br{
    position:absolute; width: 16px; height: 16px; border-color: var(--accent);
    border-style: solid; border-width: 0;
  }
  .hero .corner-tl{ top: 16px; left: 16px; border-top-width:1px; border-left-width:1px;}
  .hero .corner-tr{ top: 16px; right:16px; border-top-width:1px; border-right-width:1px;}
  .hero .corner-bl{ bottom: 16px; left: 16px; border-bottom-width:1px; border-left-width:1px;}
  .hero .corner-br{ bottom: 16px; right:16px; border-bottom-width:1px; border-right-width:1px;}

  .hero .video-tag{
    position:absolute; top: 24px; left: 36px;
    font-family:'JetBrains Mono', monospace; font-size: 11px;
    color: var(--fg-soft); letter-spacing: .14em;
    display:flex; align-items:center; gap: 8px;
  }
  .hero .video-tag .rec{
    width: 8px; height: 8px; border-radius: 50%; background: var(--warn);
    box-shadow: 0 0 10px rgba(255,107,107,0.6);
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse{
    0%, 100% { opacity: 1; transform: scale(1);}
    50% { opacity: .4; transform: scale(0.85);}
  }
  .hero .telemetry{
    position:absolute; top: 24px; right: 36px;
    font-family:'JetBrains Mono', monospace; font-size: 10px;
    color: var(--fg-mute); letter-spacing: .12em;
    text-align: right; line-height: 1.7;
  }
  .hero .telemetry b{ color: var(--accent); font-weight: 400;}

  .hero-content{
    position: absolute; left: 36px; bottom: 36px; right: 36px;
    display: grid; grid-template-columns: 1fr auto; gap: 24px; align-items: end;
  }
  .hero-content .kicker{
    font-family:'JetBrains Mono', monospace; font-size: 11px;
    letter-spacing: .25em; text-transform: uppercase;
    color: var(--accent);
    display:flex; align-items:center; gap: 10px;
    margin-bottom: 18px;
  }
  .hero-content .kicker::before{
    content:''; display:inline-block; width: 18px; height: 1px; background: var(--accent);
  }
  .hero-content h1{
    font-family:'Sora', sans-serif;
    font-weight: 600;
    font-size: 64px;
    line-height: 1.02;
    letter-spacing: -0.025em;
    margin: 0 0 14px;
    max-width: 920px;
  }
  .hero-content h1 .a{ color: var(--accent); }
  .hero-content h1 .div{
    display:inline-block; vertical-align: middle;
    width: 64px; height: 2px; background: var(--fg-soft); margin: 0 14px 12px;
  }
  .hero-content .sub{
    font-size: 16px; color: var(--fg-soft);
    max-width: 540px; line-height: 1.55; margin: 0 0 22px;
  }
  .cta-cluster{
    display:flex; gap: 12px; align-items: stretch;
  }
  .cta-register{
    background: var(--accent); color: #131722;
    padding: 16px 22px;
    font-family:'Space Grotesk', sans-serif; font-weight: 600;
    font-size: 15px;
    display:flex; flex-direction: column; gap: 2px;
    min-width: 260px;
    border: 1px solid var(--accent);
    cursor: pointer;
    transition: background .12s;
  }
  .cta-register:hover{ background: #ffd58c;}
  .cta-register .top{ display:flex; justify-content:space-between; align-items:center; gap: 18px;}
  .cta-register .ttl{ font-size: 15px;}
  .cta-register .arr{ font-family:'JetBrains Mono', monospace; font-size: 18px;}
  .cta-register .sub{
    font-family:'JetBrains Mono', monospace; font-size: 10px;
    color: rgba(19,23,34,0.7); letter-spacing: .14em; text-transform: uppercase;
  }
  .cta-trailer{
    background: rgba(15,18,26,0.65);
    backdrop-filter: blur(6px);
    border: 1px solid var(--line-3);
    padding: 16px 20px;
    color: var(--fg);
    min-width: 220px;
    cursor: pointer;
    display: grid; grid-template-columns: auto 1fr; gap: 12px; align-items: center;
    transition: border-color .12s, background .12s;
  }
  .cta-trailer:hover{ border-color: var(--accent); background: rgba(20,24,34,0.85); }
  .cta-trailer .play{
    width: 36px; height: 36px; border-radius: 50%;
    border: 1px solid var(--accent-2);
    display:flex; align-items:center; justify-content:center;
    color: var(--accent-2); font-size: 12px;
  }
  .cta-trailer .ttl{ font-weight: 500; font-size: 14px;}
  .cta-trailer .sub{
    font-family:'JetBrains Mono', monospace; font-size: 10px;
    color: var(--fg-mute); letter-spacing: .12em;
  }
  .hero-side-readouts{
    display: flex; flex-direction: column; gap: 6px;
    font-family:'JetBrains Mono', monospace; font-size: 10px;
    color: var(--fg-mute); letter-spacing: .08em;
    text-align: right;
    align-self: end;
  }
  .hero-side-readouts .k{ color: var(--accent-2);}

  /* ── ABOUT ─────────────────────────────────────────────────────────── */
  .about{
    display: grid; grid-template-columns: 1.05fr 1fr; gap: 36px;
    align-items: start;
  }
  .about h3{
    font-family:'Sora', sans-serif; font-weight: 600;
    font-size: 40px; line-height: 1.05; letter-spacing: -0.025em;
    margin: 0 0 18px; max-width: 580px;
  }
  .about h3 .a{ color: var(--accent); }
  .about .lede{ font-size: 16px; line-height: 1.6; color: var(--fg-soft); max-width: 560px; margin: 0 0 18px;}
  .about .body{ color: var(--fg-mute); font-size: 14px; line-height: 1.65; max-width: 560px;}
  .about .body p{ margin: 0 0 10px;}
  .stats{
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 0;
    margin-top: 26px; border: 1px solid var(--line-2);
  }
  .stat{
    padding: 18px 20px;
    border-right: 1px solid var(--line);
    background: var(--bg-2);
    position: relative;
  }
  .stat:last-child{ border-right: none;}
  .stat .l{ font-family:'JetBrains Mono', monospace; font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--fg-mute);}
  .stat .n{ font-family:'Sora', sans-serif; font-weight: 600; font-size: 36px; color: var(--fg); letter-spacing: -0.02em; margin-top: 4px;}
  .stat .delta{ font-family:'JetBrains Mono', monospace; font-size: 10px; color: var(--good); margin-top: 2px; letter-spacing: .1em;}

  .about-grid{
    display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 200px 200px; gap: 14px;
  }
  .about-grid .ph.big{ grid-column: 1 / 3; }

  /* ── NEWS ──────────────────────────────────────────────────────────── */
  .news-rail{
    display:flex; gap: 14px; overflow-x: auto; padding: 2px 2px 18px;
    scroll-snap-type: x mandatory;
  }
  .news-rail::-webkit-scrollbar{ height: 6px; }
  .news-rail::-webkit-scrollbar-track{ background: var(--bg-2);}
  .news-rail::-webkit-scrollbar-thumb{ background: var(--line-3); }
  .news-card{
    flex: 0 0 340px;
    border: 1px solid var(--line-2);
    background: var(--bg-2);
    scroll-snap-align: start;
    display:flex; flex-direction: column;
    position: relative;
    transition: border-color .12s, transform .12s;
  }
  .news-card:hover{ border-color: var(--accent); transform: translateY(-2px);}
  .news-card .thumb{
    height: 180px;
  }
  .news-card .body{
    padding: 18px 20px 22px;
    display:flex; flex-direction:column; gap: 10px; flex: 1;
  }
  .news-card .meta{
    display:flex; gap: 10px; align-items: center;
    font-family:'JetBrains Mono', monospace; font-size: 10px;
    color: var(--fg-mute); letter-spacing: .14em; text-transform: uppercase;
  }
  .news-card .meta .tag{
    color: var(--accent); border: 1px solid var(--line-2); padding: 2px 8px;
  }
  .news-card h4{
    font-family:'Sora', sans-serif; font-weight: 600;
    font-size: 19px; line-height: 1.25; margin: 0;
    letter-spacing: -0.012em;
  }
  .news-card .ex{
    font-size: 13px; color: var(--fg-soft); margin: 0; line-height: 1.55;
    flex: 1;
  }
  .news-card .read{
    margin-top: 8px;
    font-family:'JetBrains Mono', monospace; font-size: 11px;
    color: var(--accent); letter-spacing: .12em; text-transform: uppercase;
    text-decoration: none;
    display:inline-flex; align-items:center; gap: 6px;
  }
  .news-card .read .arr{ transition: transform .12s;}
  .news-card:hover .read .arr{ transform: translateX(4px);}
  .rail-foot{
    display:flex; justify-content: space-between; align-items: center;
    margin-top: 10px;
    font-family:'JetBrains Mono', monospace; font-size: 11px; color: var(--fg-mute);
  }
  .rail-foot .progress{ flex: 1; max-width: 280px; height: 1px; background: var(--line); margin: 0 18px;}
  .rail-foot .progress .fill{ height: 100%; background: var(--accent); width: 38%;}
  .iconbtn{
    width: 36px; height: 36px;
    border: 1px solid var(--line-2);
    background: transparent; color: var(--fg-soft);
    cursor: pointer;
    font-family:'JetBrains Mono', monospace;
    transition: border-color .12s, color .12s;
  }
  .iconbtn:hover{ border-color: var(--accent); color: var(--accent);}

  /* ── ACADEMIC ─────────────────────────────────────────────────────── */
  .acad-hero{
    position: relative;
    height: 480px;
    border: 1px solid var(--line-2);
    overflow: hidden;
    background: linear-gradient(120deg, #0a0d14 0%, #11161f 60%, #161c28 100%);
  }
  .acad-hero .grid-overlay{
    position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .acad-hero .pulse{
    position:absolute; top: 32%; left: 52%;
    width: 120px; height: 120px;
    border: 1px solid var(--accent-2);
    border-radius: 50%;
    opacity: .5;
    animation: ringpulse 3s ease-in-out infinite;
  }
  .acad-hero .pulse.b{ width: 220px; height: 220px; top: 24%; left: 48%; animation-delay: 1s; opacity: .25;}
  @keyframes ringpulse{
    0%, 100% { transform: scale(1); opacity: .5;}
    50% { transform: scale(1.05); opacity: .15;}
  }
  .acad-hero .play-glyph{
    position:absolute; top: 38%; left: 50%; transform: translate(-50%, -50%);
    width: 64px; height: 64px;
    border: 1px solid var(--accent);
    display:flex; align-items:center; justify-content:center;
    color: var(--accent); font-size: 18px;
    background: rgba(244,196,108,0.05);
    box-shadow: 0 0 30px rgba(244,196,108,0.15);
  }
  .acad-hero .video-tag{
    position:absolute; top: 22px; left: 28px;
    font-family:'JetBrains Mono', monospace; font-size: 11px;
    color: var(--fg-soft); letter-spacing: .12em;
    display:flex; align-items:center; gap: 8px;
  }
  .acad-hero .video-tag .rec{ width: 6px; height: 6px; border-radius: 50%; background: var(--warn); }
  .acad-hero .copy{
    position:absolute; left: 36px; right: 36px; bottom: 36px;
  }

    <section>
      <div className="sect-meta">
        <span className="idx">05 / 08</span>

          <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
        </div>
        <div className="cal-grid">
          {days.map((c, i) => {
            if (c.empty) return <div key={i} className="day empty"></div>;
            const ev = calEvents[c.d];
            const today = c.d === 15;
            return (
              <div key={i} className={`day ${ev ? 'has-event':''} ${today ? 'today':''}`}>
                <div className="n">{String(c.d).padStart(2,'0')}</div>
                {ev && (
                  <>
                    <div className={`ev ${ev.kind}`}>
                      <div className="t">{ev.when}</div>
                      <div>{ev.title}</div>
                    </div>
                    <div className="hover-card">
                      <div className="hc-media ph">
                        <span className="ph-corner">{`EVT_${String(c.d).padStart(2,'0')} · ${ev.media === 'video' ? 'VIDEO' : 'PHOTO'}`}</span>
                        <span className="ph-dims">600 × 280</span>
                        {ev.media === 'video' && <div className="play">▶</div>}

                      <div className="hc-body">

        </div>
        <div className="right">
          <span>v0.2 · WIREFRAME</span>
          <span>BUILD 2026.05.17</span>
        </div>
      </div>
    </footer>
  );
}

/* ── APP ────────────────────────────────────────────────────────── */
function App(){
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const accentClass = t.accent === 'cyan' ? 'accent-cyan' : t.accent === 'violet' ? 'accent-violet' : '';
  const modeClass = t.mode === 'light' ? 'mode-light' : '';
  const densityClass = `density-${t.density}`;
  return (
    <div className={`page ${accentClass} ${modeClass} ${densityClass}`}>
      <SysBar/>
      <TopNav/>
      <Hero ctaShape={t.ctaShape} annotations={t.annotations}/>
      <About/>
      <News layout={t.newsLayout}/>
      <Academic/>
      <Calendar/>
      <Contact/>
      <DevelopedBy/>
      <FooterBig/>

      <TweaksPanel title="Wireframe v2 · Tech">
        <TweakSection label="Theme" />
        <TweakRadio label="Mode" value={t.mode} options={[
          { value:'dark', label:'Dark' },
          { value:'light', label:'Light' },
        ]} onChange={v=>setTweak('mode', v)} />
        <TweakRadio label="Accent" value={t.accent} options={[
          { value:'amber', label:'Amber' },
          { value:'cyan', label:'Cyan' },
          { value:'violet', label:'Violet' },
        ]} onChange={v=>setTweak('accent', v)} />

        <TweakSection label="Hero" />
        <TweakRadio label="CTA arrangement" value={t.ctaShape} options={[
          { value:'side', label:'Side-by-side' },
          { value:'stacked', label:'Stacked' },
        ]} onChange={v=>setTweak('ctaShape', v)} />
        <TweakToggle label="Show annotations" value={t.annotations} onChange={v=>setTweak('annotations', v)} />

        <TweakSection label="News" />
        <TweakRadio label="Layout" value={t.newsLayout} options={[
          { value:'carousel', label:'Carousel' },
          { value:'grid', label:'3-up grid' },
        ]} onChange={v=>setTweak('newsLayout', v)} />

        <TweakSection label="Layout" />
        <TweakRadio label="Density" value={t.density} options={[
          { value:'compact', label:'Compact' },
          { value:'regular', label:'Regular' },
          { value:'loose', label:'Loose' },
        ]} onChange={v=>setTweak('density', v)} />
      </TweaksPanel>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
